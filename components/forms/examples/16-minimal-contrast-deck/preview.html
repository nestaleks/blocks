<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal" id="form-01">
        <div class="block__label"><span>Example 16</span><span>Minimal Contrast Deck</span></div>
        <div class="demo">
          <form class="f-min">
            <div class="f-group">
              <label>Name</label>
              <input type="text" placeholder="John Doe">
            </div>
            <div class="f-group">
              <label>Email</label>
              <input type="email" placeholder="john@example.com">
            </div>
            <div class="f-group">
              <label>Message</label>
              <textarea placeholder="How can we help?"></textarea>
            </div>
            <button type="button" class="btn-f">Send Message</button>
          </form>
        </div>
      </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
