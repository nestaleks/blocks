<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Scroll Layout</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Forms / Cinematic Scroll Layout</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"form-01\">\r\n        <div class=\"block__label\"><span>Example 20</span><span>Cinematic Scroll Layout</span></div>\r\n        <div class=\"demo\">\r\n          <form class=\"f-min\">\r\n            <div class=\"f-group\">\r\n              <label>Name</label>\r\n              <input type=\"text\" placeholder=\"John Doe\">\r\n            </div>\r\n            <div class=\"f-group\">\r\n              <label>Email</label>\r\n              <input type=\"email\" placeholder=\"john@example.com\">\r\n            </div>\r\n            <div class=\"f-group\">\r\n              <label>Message</label>\r\n              <textarea placeholder=\"How can we help?\"></textarea>\r\n            </div>\r\n            <button type=\"button\" class=\"btn-f\">Send Message</button>\r\n          </form>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- FORMS STYLES --- */\r\n\r\ninput, textarea, select {\r\n  width: 100%; padding: 12px 16px; border-radius: 12px;\r\n  border: 1px solid var(--line); background: var(--bg-2);\r\n  color: var(--text); outline: none; transition: .2s;\r\n}\r\ninput:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(163,107,255,0.1); }\r\nlabel { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--muted); }\r\n\r\n/* 01: Minimalist */\r\n.f-min { display: flex; flex-direction: column; gap: 16px; }\r\n.btn-f { padding: 14px; border-radius: 12px; border: none; background: var(--text); color: var(--bg); font-weight: 700; cursor: pointer; }\r\n\r\n/* 02: Newsletter Glass */\r\n.f-newsletter-glass { color: #fff; text-align: center; }\r\n.f-newsletter-glass h3 { font-size: 28px; margin: 0 0 10px; }\r\n.f-newsletter-glass p { opacity: 0.8; margin-bottom: 30px; }\r\n.f-inline { display: flex; gap: 10px; }\r\n.f-inline input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; }\r\n.btn-f-glass { padding: 0 24px; border-radius: 12px; border: none; background: #fff; color: #1e3a8a; font-weight: 700; cursor: pointer; }\r\n\r\n/* 03: Floating Labels */\r\n.f-floating { display: flex; flex-direction: column; gap: 20px; }\r\n.f-field { position: relative; }\r\n.f-field input:placeholder-shown + label { top: 14px; font-size: 15px; font-weight: 400; color: var(--muted); }\r\n.f-field label { position: absolute; left: 16px; top: -10px; background: var(--bg-2); padding: 0 4px; font-size: 12px; transition: .2s; pointer-events: none; }\r\n.f-field input:focus + label { top: -10px; font-size: 12px; color: var(--accent); font-weight: 700; }\r\n.btn-f-dark { padding: 14px; border-radius: 12px; border: none; background: #000; color: #fff; font-weight: 700; cursor: pointer; }\r\n\r\n/* 04: Dark */\r\n.f-dark label { color: #fff; opacity: 0.7; }\r\n.f-dark input, .f-dark select { background: #111; border-color: #333; color: #fff; }\r\n.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }\r\n.btn-f-accent { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }\r\n\r\n/* 05: Stepper */\r\n.f-stepper { text-align: center; }\r\n.steps-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }\r\n.step { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--line); display: grid; place-items: center; font-size: 13px; font-weight: 800; }\r\n.step.active { border-color: var(--accent); color: var(--accent); }\r\n\r\n/* 06: Feedback */\r\n.f-feedback { text-align: center; }\r\n.f-rating { font-size: 32px; display: flex; justify-content: center; gap: 20px; margin: 20px 0; cursor: pointer; }\r\n.btn-f.outline { background: transparent; border: 1px solid var(--line); color: var(--text); }\r\n\r\n/* 07: Split */\r\n.f-split { display: grid; grid-template-columns: 1fr 1fr; min-height: 400px; }\r\n.f-split-img { background: center/cover no-repeat; }\r\n.f-split-content { padding: 40px; display: flex; flex-direction: column; gap: 15px; justify-content: center; }\r\n\r\n/* 08: Brutalist */\r\n.f-brutalist { padding: 20px; border: 4px solid #000; box-shadow: 10px 10px 0 #000; background: #fff; }\r\n.f-brutalist input { border: 3px solid #000; border-radius: 0; font-weight: 900; }\r\n.f-brutalist button { width: 100%; padding: 15px; border: 3px solid #000; background: #ffde59; font-weight: 900; cursor: pointer; margin-top: 10px; }\r\n\r\n/* 09: Underline */\r\n.f-underline input { border: none; border-radius: 0; border-bottom: 2px solid var(--line); background: transparent; padding-left: 0; margin-bottom: 10px; }\r\n.f-underline input:focus { border-bottom-color: var(--text); box-shadow: none; }\r\n.btn-f-text { background: none; border: none; font-weight: 800; font-size: 16px; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 10px; }\r\n\r\n/* 10: Toggle */\r\n.t-options { display: flex; flex-wrap: wrap; gap: 10px; }\r\n.t-item input { display: none; }\r\n.t-item span { display: block; padding: 10px 20px; border: 1px solid var(--line); border-radius: 100px; cursor: pointer; font-size: 14px; font-weight: 600; }\r\n.t-item input:checked + span { background: var(--text); color: var(--bg); border-color: var(--text); }\r\n\r\n@media (max-width: 768px) {\r\n  .f-row, .f-split { grid-template-columns: 1fr; }\r\n  .f-split-img { height: 200px; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\r\n  // Theme Toggle\r\n  const themeBtn = document.querySelector('[data-theme-toggle]');\r\n  const html = document.documentElement;\r\n\r\n  if (themeBtn) {\r\n    themeBtn.addEventListener('click', () => {\r\n      const currentTheme = html.getAttribute('data-theme');\r\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\r\n      html.setAttribute('data-theme', newTheme);\r\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\r\n    });\r\n  }\r\n\r\n  // Intersection Observer for Reveal\r\n  const observerOptions = {\r\n    threshold: 0.1\r\n  };\r\n\r\n  const observer = new IntersectionObserver((entries) => {\r\n    entries.forEach(entry => {\r\n      if (entry.isIntersecting) {\r\n        entry.target.classList.add('active');\r\n      }\r\n    });\r\n  }, observerOptions);\r\n\r\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\r\n});\r\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
