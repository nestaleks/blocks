<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal" id="form-02">
        <div class="block__label"><span>Example 02</span><span>Newsletter Glass</span></div>
        <div class="demo" style="background: linear-gradient(135deg, #1e3a8a, #581c87); padding: 60px 40px; border-radius: 20px;">
          <div class="f-newsletter-glass">
            <h3>Stay in the loop</h3>
            <p>Get the latest updates directly in your inbox.</p>
            <div class="f-inline">
              <input type="email" placeholder="Your email address">
              <button type="button" class="btn-f-glass">Subscribe</button>
            </div>
          </div>
        </div>
      </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
