<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal" id="form-05">
        <div class="block__label"><span>Example 05</span><span>Multi-Step Progress</span></div>
        <div class="demo">
          <div class="f-stepper">
            <div class="steps-nav">
              <div class="step active">1</div>
              <div class="step">2</div>
              <div class="step">3</div>
            </div>
            <div class="step-content">
              <h3>Personal Info</h3>
              <p>Step 1 of 3</p>
              <div class="f-min">
                <input type="text" placeholder="Phone Number">
                <button type="button" class="btn-f">Next Step</button>
              </div>
            </div>
          </div>
        </div>
      </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
