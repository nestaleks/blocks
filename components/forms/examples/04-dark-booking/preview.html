<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal" id="form-04">
        <div class="block__label"><span>Example 04</span><span>Dark Booking</span></div>
        <div class="demo" style="background: #000; padding: 40px; border-radius: 20px;">
          <form class="f-dark">
            <div class="f-row">
              <div class="f-group">
                <label>Arrival</label>
                <input type="date">
              </div>
              <div class="f-group">
                <label>Guests</label>
                <select>
                  <option>1 Person</option>
                  <option>2 Persons</option>
                  <option>3+ Persons</option>
                </select>
              </div>
            </div>
            <button type="button" class="btn-f-accent">Check Availability</button>
          </form>
        </div>
      </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
