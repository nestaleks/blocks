<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data-Driven Feature Grid</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Blog / Data-Driven Feature Grid</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"blog-01\">\r\n        <div class=\"block__label\"><span>Example 19</span><span>Data-Driven Feature Grid</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"blog-grid\">\r\n            <div class=\"blog-card\">\r\n              <div class=\"blog-img\"><img src=\"https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600&h=400&fit=crop\" alt=\"\"></div>\r\n              <div class=\"blog-content\">\r\n                <span class=\"category\">Development</span>\r\n                <h4>Modern Web Architectures</h4>\r\n                <p>Learn how to build scalable apps with the latest technologies.</p>\r\n                <a href=\"#\" class=\"read-more\">Read More →</a>\r\n              </div>\r\n            </div>\r\n            <div class=\"blog-card\">\r\n              <div class=\"blog-img\"><img src=\"https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=600&h=400&fit=crop\" alt=\"\"></div>\r\n              <div class=\"blog-content\">\r\n                <span class=\"category\">Design</span>\r\n                <h4>The Future of UI Design</h4>\r\n                <p>Exploring the trends that will shape our digital interfaces.</p>\r\n                <a href=\"#\" class=\"read-more\">Read More →</a>\r\n              </div>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- BLOG STYLES --- */\r\n\r\n/* 01: Data-Driven Feature Grid */\r\n.blog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }\r\n.blog-card { background: var(--bg-2); border-radius: 20px; overflow: hidden; border: 1px solid var(--line); transition: .3s; }\r\n.blog-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }\r\n.blog-img img { width: 100%; height: 240px; object-fit: cover; display: block; }\r\n.blog-content { padding: 25px; }\r\n.category { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; display: block; }\r\n.blog-content h4 { margin: 0 0 10px; font-size: 20px; }\r\n.blog-content p { margin: 0 0 20px; color: var(--muted); font-size: 15px; }\r\n.read-more { font-weight: 700; text-decoration: none; color: var(--text); font-size: 14px; }\r\n\r\n/* 02: Bento Blog */\r\n.blog-bento { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 300px; gap: 15px; }\r\n.blog-b-card { border-radius: 24px; overflow: hidden; position: relative; background: var(--bg-2); border: 1px solid var(--line); }\r\n.blog-b-card.main { grid-column: span 2; }\r\n.blog-b-card.main img { width: 100%; height: 100%; object-fit: cover; }\r\n.blog-b-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding: 30px; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; }\r\n.badge { background: var(--accent); padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 800; width: fit-content; margin-bottom: 10px; }\r\n.blog-b-content { padding: 25px; }\r\n\r\n/* 03: Minimal List */\r\n.blog-list { display: flex; flex-direction: column; }\r\n.blog-l-item { display: flex; align-items: center; gap: 30px; padding: 25px 0; border-bottom: 1px solid var(--line); }\r\n.blog-l-item:last-child { border-bottom: none; }\r\n.blog-l-item .date { font-size: 13px; color: var(--muted); font-weight: 600; min-width: 100px; }\r\n.l-info { flex: 1; }\r\n.l-info h4 { margin: 0 0 5px; font-size: 18px; transition: .2s; }\r\n.blog-l-item:hover h4 { color: var(--accent); }\r\n.l-info p { margin: 0; color: var(--muted); font-size: 14px; }\r\n.arrow { font-size: 24px; text-decoration: none; color: var(--line); }\r\n\r\n/* 04: Featured */\r\n.blog-featured { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }\r\n.feat-img img { width: 100%; border-radius: 24px; display: block; }\r\n.feat-info h2 { font-size: 32px; margin: 15px 0; line-height: 1.2; }\r\n.author { display: flex; align-items: center; gap: 12px; margin-top: 25px; }\r\n.author img { width: 40px; height: 40px; border-radius: 50%; }\r\n.author span { font-weight: 600; font-size: 14px; }\r\n\r\n/* 05: Glass Cards */\r\n.blog-glass { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\r\n.blog-g-card { padding: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: #fff; }\r\n.g-date { font-weight: 800; color: var(--accent-2); font-size: 12px; display: block; margin-bottom: 10px; }\r\n\r\n/* 06: Brutalist */\r\n.blog-br-card { background: #fff; border: 4px solid #fff; box-shadow: 12px 12px 0 var(--accent-2); }\r\n.br-header { background: #000; color: #fff; padding: 10px 20px; font-weight: 900; }\r\n.br-body { padding: 30px; color: #000; }\r\n.br-body h3 { font-size: 28px; font-weight: 900; margin: 0 0 10px; }\r\n.br-body a { font-weight: 900; color: #000; text-decoration: none; border-bottom: 3px solid #000; }\r\n\r\n/* 07: Masonry */\r\n.blog-masonry { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }\r\n.masonry-item { position: relative; border-radius: 20px; overflow: hidden; }\r\n.masonry-item img { width: 100%; display: block; transition: .5s; }\r\n.masonry-item h4 { position: absolute; bottom: 20px; left: 20px; color: #fff; margin: 0; z-index: 1; }\r\n.masonry-item:hover img { transform: scale(1.1); }\r\n\r\n/* 08: Scroller */\r\n.blog-scroll { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }\r\n.scroll-card { min-width: 250px; padding: 30px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 24px; }\r\n\r\n/* 09: Image Grid */\r\n.blog-img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }\r\n.img-box { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; }\r\n.img-box img { width: 100%; height: 200px; object-fit: cover; display: block; }\r\n.img-box .overlay { position: absolute; inset: 0; background: rgba(163, 107, 255, 0.8); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; opacity: 0; transition: .3s; }\r\n.img-box:hover .overlay { opacity: 1; }\r\n\r\n/* 10: Expand */\r\n.blog-expand { display: flex; gap: 15px; height: 300px; }\r\n.expand-item { flex: 1; position: relative; border-radius: 24px; overflow: hidden; transition: flex .5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }\r\n.expand-item.active { flex: 3; }\r\n.expand-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: .5s; }\r\n.expand-item h3 { position: absolute; bottom: 20px; left: 20px; color: #fff; margin: 0; white-space: nowrap; }\r\n\r\n@media (max-width: 768px) {\r\n  .blog-grid, .blog-bento, .blog-featured, .blog-glass, .blog-masonry, .blog-img-grid { grid-template-columns: 1fr; }\r\n  .blog-bento { grid-template-rows: auto; }\r\n  .blog-expand { flex-direction: column; height: auto; }\r\n  .expand-item { height: 150px; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n\r\n.gallery-footer { padding: 60px 0; text-align: center; color: var(--muted); border-top: 1px solid var(--line); margin-top: 60px; }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\n  const THEME_KEY = 'premium-theme';\n  const themeBtn = document.querySelector('[data-theme-toggle]');\n  const html = document.documentElement;\n  const saved = localStorage.getItem(THEME_KEY);\n  if (saved) {\n    html.setAttribute('data-theme', saved);\n  }\n\n  if (themeBtn) {\n    themeBtn.addEventListener('click', () => {\n      const currentTheme = html.getAttribute('data-theme');\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\n      html.setAttribute('data-theme', newTheme);\n      localStorage.setItem(THEME_KEY, newTheme);\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\n    });\n  }\n\n  const expandItems = document.querySelectorAll('.expand-item');\n  expandItems.forEach((item) => {\n    item.addEventListener('mouseenter', () => {\n      expandItems.forEach((node) => node.classList.remove('active'));\n      item.classList.add('active');\n    });\n  });\n\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach((entry) => {\n      if (entry.isIntersecting) entry.target.classList.add('active');\n    });\n  }, { threshold: 0.1 });\n\n  document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));\n\n  document.querySelectorAll('a[target=\"_blank\"]').forEach((anchor) => {\n    if (!anchor.hasAttribute('rel')) {\n      anchor.setAttribute('rel', 'noopener noreferrer');\n    }\n  });\n\n  document.querySelectorAll('img').forEach((img, index) => {\n    if (!img.hasAttribute('loading')) {\n      img.loading = index === 0 ? 'eager' : 'lazy';\n    }\n    if (!img.hasAttribute('decoding')) {\n      img.decoding = 'async';\n    }\n  });\n});\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
