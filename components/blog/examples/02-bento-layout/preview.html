<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal" id="blog-02">
        <div class="block__label"><span>Example 02</span><span>Bento Layout</span></div>
        <div class="demo">
          <div class="blog-bento">
            <div class="blog-b-card main">
              <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800&h=600&fit=crop" alt="">
              <div class="blog-b-overlay">
                <span class="badge">Featured</span>
                <h3>Transforming Industries with AI</h3>
                <p>Deep dive into the world of artificial intelligence and its impact on businesses.</p>
              </div>
            </div>
            <div class="blog-b-card">
              <div class="blog-b-content">
                <span class="category">News</span>
                <h4>New Funding Round</h4>
                <p>We raised $50M to accelerate our growth.</p>
              </div>
            </div>
            <div class="blog-b-card">
              <div class="blog-b-content">
                <span class="category">Product</span>
                <h4>v2.0 is Here</h4>
                <p>Check out the latest features in our biggest update.</p>
              </div>
            </div>
          </div>
        </div>
      </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
