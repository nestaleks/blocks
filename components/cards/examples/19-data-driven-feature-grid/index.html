<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data-Driven Feature Grid</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Cards / Data-Driven Feature Grid</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\">\n  <div class=\"block__label\"><span>Example 06</span><span>Data-Driven Feature Grid</span></div>\n  <div class=\"demo\">\n    <div class=\"cards c-hover-reveal\" style=\"grid-template-columns: repeat(2, 1fr);\">\n      <article>\n        <img src=\"https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=600&q=80\">\n        <div class=\"reveal-content\">\n          <h3>UX Strategy</h3>\n          <p>Deep dive into user behavior and business goals.</p>\n        </div>\n      </article>\n      <article>\n        <img src=\"https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=600&q=80\">\n        <div class=\"reveal-content\">\n          <h3>UI Design</h3>\n          <p>Pixel perfect interfaces for modern apps.</p>\n        </div>\n      </article>\n    </div>\n  </div>\n</article>","css":":root {\n  --bg: #f5f3ee;\n  --bg-2: #ffffff;\n  --text: #151515;\n  --muted: #67645f;\n  --line: rgba(20,20,20,.12);\n  --card: rgba(255,255,255,.72);\n  --card-solid: #ffffff;\n  --accent: #a36bff;\n  --accent-2: #ffb86b;\n  --accent-3: #4ed6b8;\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\n  --radius: 28px;\n}\n\n:root[data-theme=\"dark\"] {\n  --bg: #0a0b10;\n  --bg-2: #11131c;\n  --text: #f7f4ee;\n  --muted: #aaa7b7;\n  --line: rgba(255,255,255,.14);\n  --card: rgba(255,255,255,.08);\n  --card-solid: #151823;\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  margin: 0;\n  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  color: var(--text);\n  background:\n    radial-gradient(circle at top left, rgba(163,107,255,.20), transparent 36rem),\n    radial-gradient(circle at 85% 10%, rgba(78,214,184,.14), transparent 32rem),\n    var(--bg);\n}\na { color: inherit; text-decoration: none; }\nbutton, input { font: inherit; }\nimg { max-width: 100%; display: block; }\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  backdrop-filter: blur(18px);\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\n  border-bottom: 1px solid var(--line);\n}\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:-.04em; }\n.logo span:first-child {\n  width:38px; height:38px; border-radius:14px;\n  display:grid; place-items:center;\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\n  box-shadow: 0 14px 40px rgba(163,107,255,.35);\n}\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\n.theme-btn, .pill-btn {\n  border:1px solid var(--line);\n  color:var(--text);\n  background:var(--card);\n  border-radius:999px;\n  padding:10px 14px;\n  cursor:pointer;\n  box-shadow: 0 10px 28px rgba(0,0,0,.05);\n}\n.intro { padding: 72px 0 42px; }\n.kicker {\n  display:inline-flex; gap:8px; align-items:center;\n  border:1px solid var(--line);\n  background:var(--card);\n  border-radius:999px;\n  padding:8px 12px;\n  color:var(--muted);\n  font-size:13px;\n  font-weight:700;\n}\nh1 {\n  margin:18px 0 14px;\n  font-size: clamp(42px, 8vw, 92px);\n  line-height:.92;\n  letter-spacing:-.075em;\n}\n.intro p { max-width:760px; color:var(--muted); font-size: clamp(17px, 2vw, 21px); line-height:1.7; }\n.grid { display:grid; gap:28px; padding:28px 0 90px; }\n.block {\n  overflow:hidden;\n  border:1px solid var(--line);\n  border-radius: calc(var(--radius) + 8px);\n  background: var(--card);\n  box-shadow: var(--shadow);\n  backdrop-filter: blur(18px);\n}\n.block__label {\n  display:flex; justify-content:space-between; align-items:center; gap:16px;\n  padding:14px 18px; border-bottom:1px solid var(--line);\n  color:var(--muted); font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.12em;\n}\n.demo { padding: clamp(22px, 4vw, 44px); }\n.badge {\n  display:inline-flex; align-items:center; gap:8px;\n  font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;\n  color:var(--muted);\n  border:1px solid var(--line);\n  padding:7px 10px; border-radius:999px;\n  background:rgba(255,255,255,.08);\n}\n.btn-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; }\n.btn {\n  border:1px solid var(--line);\n  border-radius:999px;\n  padding:12px 17px;\n  font-weight:850;\n  background:var(--text);\n  color:var(--bg);\n  display:inline-flex; gap:8px; align-items:center;\n}\n.btn.secondary { background:transparent; color:var(--text); }\n.reveal { opacity:0; transform: translateY(24px); transition: .7s ease; }\n.reveal.is-visible { opacity:1; transform:none; }\n.footer-note { padding: 28px 0 60px; color:var(--muted); text-align:center; }\n@media (max-width: 780px) {\n  .nav { display:none; }\n  .topbar__inner { min-height:64px; }\n  .intro { padding:42px 0 20px; }\n  h1 { font-size: clamp(38px, 15vw, 58px); }\n  .demo { padding:22px; }\n  .block__label { align-items:flex-start; flex-direction:column; gap:6px; }\n}\n\n\n.cards { display:grid; gap:18px; }\n.portfolio { grid-template-columns:repeat(2,1fr); }\n.portfolio article,.services article,.glass article { overflow:hidden; border-radius:28px; border:1px solid var(--line); background:var(--card-solid); box-shadow:var(--shadow); }\n.portfolio img { height:280px; width:100%; object-fit:cover; }\n.portfolio h3,.portfolio p { margin-left:24px; margin-right:24px; }\n.portfolio h3 { font-size:30px; letter-spacing:-.05em; }\n.portfolio p,.services p { color:var(--muted); }\n.services { grid-template-columns:repeat(3,1fr); }\n.services article,.glass article { padding:28px; }\n.services span { color:var(--accent); font-weight:950; }\n.services h3 { font-size:30px; letter-spacing:-.05em; line-height:1.05; }\n.glass { grid-template-columns:repeat(3,1fr); padding:30px; border-radius:34px; background:linear-gradient(135deg, rgba(163,107,255,.22), rgba(78,214,184,.16)); }\n.glass article { background:rgba(255,255,255,.18); backdrop-filter:blur(20px); min-height:190px; font-size:40px; }\n\n/* New card variants */\n.testimonials { grid-template-columns:repeat(3,1fr); }\n.testimonials article { padding:24px; display:flex; flex-direction:column; gap:12px; }\n.testimonials p { font-style:italic; line-height:1.5; }\n.testimonials b { margin-top:auto; font-weight:600; }\n\n.pricing { grid-template-columns:repeat(3,1fr); }\n.pricing article { padding:32px 24px; display:flex; flex-direction:column; gap:12px; }\n.pricing small { color:var(--muted); text-transform:uppercase; font-size:12px; letter-spacing:.1em; }\n.pricing h3 { font-size:36px; margin:8px 0; }\n.pricing h3 span { font-size:16px; color:var(--muted); font-weight:500; }\n.pricing p { color:var(--muted); margin-bottom:12px; }\n.pricing .featured { background:linear-gradient(135deg, rgba(163,107,255,.12), rgba(78,214,184,.08)); position:relative; }\n.pricing .featured span { position:absolute; top:12px; right:12px; background:var(--accent); color:#fff; padding:4px 10px; border-radius:999px; font-size:11px; }\n\n.team { grid-template-columns:repeat(3,1fr); }\n.team article { padding:0; text-align:center; }\n.team img { width:100%; height:200px; object-fit:cover; }\n.team h3 { margin:16px 0 4px; }\n.team p { color:var(--muted); margin:0; }\n\n.features { grid-template-columns:repeat(3,1fr); }\n.features article { padding:28px; text-align:center; }\n.features span { font-size:36px; display:block; margin-bottom:12px; }\n.features h3 { font-size:22px; margin:8px 0; }\n\n.blog { grid-template-columns:repeat(2,1fr); }\n.blog article { padding:0; overflow:hidden; }\n.blog img { height:180px; width:100%; object-fit:cover; }\n.blog h3 { margin:16px 16px 8px; font-size:22px; }\n.blog p { margin:0 16px 12px; color:var(--muted); font-size:14px; }\n.blog small { display:block; margin:0 16px 16px; color:var(--muted); font-size:12px; }\n\n/* Even More Cards */\n.c-hover-reveal article { position: relative; overflow: hidden; }\n.c-hover-reveal .reveal-content { position: absolute; inset: 0; background: var(--accent); color: #fff; display: flex; flex-direction: column; justify-content: center; padding: 28px; transform: translateY(100%); transition: transform 0.3s ease; }\n.c-hover-reveal article:hover .reveal-content { transform: translateY(0); }\n.c-glow-border article { position: relative; background: #000; color: #fff; border: 0; }\n.c-glow-border article:before { content: \"\"; position: absolute; inset: -2px; background: linear-gradient(45deg, #f06, #9f6, #06f, #f06); border-radius: 30px; z-index: -1; opacity: 0; transition: opacity 0.3s; }\n.c-glow-border article:hover:before { opacity: 1; }\n.c-product-bento { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 180px); }\n.c-product-bento .large { grid-column: span 2; grid-row: span 2; }\n.c-glass article { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }\n.c-minimal article { border: 0; border-radius: 0; background: transparent; border-bottom: 1px solid var(--line); padding: 20px 0; }\n\n@media(max-width:760px){\n  .portfolio,.services,.glass,.testimonials,.pricing,.team,.features{grid-template-columns:1fr}\n  .portfolio img{height:220px}\n  .blog{grid-template-columns:1fr}\n}","js":"const themeBtn = document.querySelector('[data-theme-toggle]');\nconst root = document.documentElement;\nconst savedTheme = localStorage.getItem('premium-block-theme');\nif (savedTheme) root.dataset.theme = savedTheme;\n\nthemeBtn?.addEventListener('click', () => {\n  const next = root.dataset.theme === 'dark' ? 'light' : 'dark';\n  root.dataset.theme = next;\n  localStorage.setItem('premium-block-theme', next);\n});\n\nconst revealItems = document.querySelectorAll('.reveal');\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach((entry) => {\n    if (entry.isIntersecting) {\n      entry.target.classList.add('is-visible');\n      io.unobserve(entry.target);\n    }\n  });\n}, { threshold: 0.16 });\nrevealItems.forEach((item) => io.observe(item));\n\ndocument.querySelectorAll('[data-menu]').forEach((btn) => {\n  btn.addEventListener('click', () => {\n    btn.closest('.block')?.classList.toggle('menu-open');\n  });\n});"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
