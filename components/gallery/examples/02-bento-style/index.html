<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bento Style - Gallery</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Gallery / Bento Style</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"gal-02\">\r\n        <div class=\"block__label\"><span>Example 02</span><span>Bento Style</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"gallery-bento\">\r\n            <div class=\"gal-b-item main\"><img src=\"https://images.unsplash.com/photo-1518770660439-4636190af475?w=800&h=600&fit=crop\" alt=\"\"></div>\r\n            <div class=\"gal-b-item\"><img src=\"https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&h=300&fit=crop\" alt=\"\"></div>\r\n            <div class=\"gal-b-item\"><img src=\"https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=400&h=300&fit=crop\" alt=\"\"></div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- GALLERY STYLES --- */\r\n\r\n/* 01: Modern Grid */\r\n.gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }\r\n.gal-item img { width: 100%; border-radius: 16px; display: block; transition: .3s; }\r\n.gal-item:hover img { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }\r\n\r\n/* 02: Bento */\r\n.gallery-bento { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 200px 200px; gap: 15px; }\r\n.gal-b-item { border-radius: 24px; overflow: hidden; border: 1px solid var(--line); }\r\n.gal-b-item.main { grid-column: span 2; grid-row: span 2; }\r\n.gal-b-item img { width: 100%; height: 100%; object-fit: cover; }\r\n\r\n/* 03: List */\r\n.gallery-list { display: flex; flex-direction: column; }\r\n.gal-l-item { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid var(--line); cursor: pointer; transition: .3s; }\r\n.gal-l-item span { font-size: 32px; font-weight: 900; }\r\n.gal-l-item:hover { color: var(--accent); padding-left: 20px; }\r\n\r\n/* 04: Masonry */\r\n.gallery-masonry { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }\r\n.gal-m-item img { width: 100%; border-radius: 20px; object-fit: cover; }\r\n.h-1 img { height: 400px; }\r\n.h-2 img { height: 250px; }\r\n.h-3 img { height: 350px; }\r\n\r\n/* 05: Glass */\r\n.gal-g-item { position: relative; border-radius: 24px; overflow: hidden; }\r\n.gal-g-item img { width: 100%; display: block; }\r\n.gal-g-overlay { position: absolute; bottom: 20px; left: 20px; right: 20px; padding: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; color: #fff; transform: translateY(100%); transition: .4s; }\r\n.gal-g-item:hover .gal-g-overlay { transform: translateY(0); }\r\n\r\n/* 06: Brutalist */\r\n.gallery-brutal { display: flex; justify-content: center; }\r\n.gal-br-card { position: relative; border: 4px solid #fff; width: 400px; }\r\n.gal-br-card img { width: 100%; display: block; }\r\n.gal-br-tag { position: absolute; top: -20px; right: -20px; background: var(--accent-2); color: #000; padding: 10px 20px; font-weight: 900; border: 4px solid #000; }\r\n\r\n/* 07: Scroll */\r\n.gallery-scroll { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }\r\n.gal-s-item img { height: 300px; border-radius: 20px; }\r\n\r\n/* 08: Split */\r\n.gallery-split { display: flex; gap: 10px; height: 400px; }\r\n.gal-sp-item { flex: 1; position: relative; border-radius: 20px; overflow: hidden; transition: .5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }\r\n.gal-sp-item.active { flex: 3; }\r\n.gal-sp-item img { width: 100%; height: 100%; object-fit: cover; }\r\n.gal-sp-item h3 { position: absolute; bottom: 30px; left: 30px; color: #fff; margin: 0; font-size: 24px; }\r\n\r\n/* 09: Table */\r\n.gallery-table { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--bg-2); }\r\n.gal-t-row { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 20px 30px; border-bottom: 1px solid var(--line); }\r\n.gal-t-row.header { background: var(--bg); font-weight: 800; font-size: 13px; text-transform: uppercase; }\r\n.client { font-weight: 700; }\r\n\r\n/* 10: Immersive */\r\n.gal-immersive { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 60px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); color: #fff; }\r\n.gal-immersive h2 { font-size: 48px; margin: 0; }\r\n\r\n@media (max-width: 768px) {\r\n  .gallery-grid, .gallery-bento, .gallery-masonry, .gal-t-row { grid-template-columns: 1fr; }\r\n  .gallery-bento { grid-template-rows: auto; }\r\n  .gallery-split { flex-direction: column; height: auto; }\r\n  .gal-sp-item { height: 200px; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n\r\n.gallery-footer { padding: 60px 0; text-align: center; color: var(--muted); border-top: 1px solid var(--line); margin-top: 60px; }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\n  const THEME_KEY = 'premium-theme';\n  const themeBtn = document.querySelector('[data-theme-toggle]');\n  const html = document.documentElement;\n  const saved = localStorage.getItem(THEME_KEY);\n  if (saved) {\n    html.setAttribute('data-theme', saved);\n  }\n\n  if (themeBtn) {\n    themeBtn.addEventListener('click', () => {\n      const currentTheme = html.getAttribute('data-theme');\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\n      html.setAttribute('data-theme', newTheme);\n      localStorage.setItem(THEME_KEY, newTheme);\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\n    });\n  }\n\n  const splitItems = document.querySelectorAll('.gal-sp-item');\n  splitItems.forEach((item) => {\n    item.addEventListener('mouseenter', () => {\n      splitItems.forEach((node) => node.classList.remove('active'));\n      item.classList.add('active');\n    });\n  });\n\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach((entry) => {\n      if (entry.isIntersecting) entry.target.classList.add('active');\n    });\n  }, { threshold: 0.1 });\n\n  document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));\n\n  document.querySelectorAll('a[target=\"_blank\"]').forEach((anchor) => {\n    if (!anchor.hasAttribute('rel')) {\n      anchor.setAttribute('rel', 'noopener noreferrer');\n    }\n  });\n\n  document.querySelectorAll('img').forEach((img, index) => {\n    if (!img.hasAttribute('loading')) {\n      img.loading = index === 0 ? 'eager' : 'lazy';\n    }\n    if (!img.hasAttribute('decoding')) {\n      img.decoding = 'async';\n    }\n  });\n});\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
