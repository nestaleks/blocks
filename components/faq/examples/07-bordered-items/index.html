<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bordered Items - Faq</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Faq / Bordered Items</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"faq-07\">\r\n        <div class=\"block__label\"><span>Example 07</span><span>Bordered Items</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"faq-bordered\">\r\n            <div class=\"faq-br-item\">\r\n              <div class=\"faq-br-q\">Can I export my data?</div>\r\n              <div class=\"faq-br-a\">Of course! You can export all your data in JSON or CSV format at any time.</div>\r\n            </div>\r\n            <div class=\"faq-br-item\">\r\n              <div class=\"faq-br-q\">How many users can I add?</div>\r\n              <div class=\"faq-br-a\">The starter plan allows up to 5 users. Pro and Enterprise have no limits.</div>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- FAQ STYLES --- */\r\n\r\n/* 01: Classic Accordion */\r\n.faq-accordion { display: flex; flex-direction: column; gap: 12px; }\r\n.faq-item { border: 1px solid var(--line); border-radius: 16px; background: var(--bg-2); overflow: hidden; }\r\n.faq-trigger {\r\n  width: 100%; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;\r\n  background: none; border: none; font-size: 17px; font-weight: 600; text-align: left; cursor: pointer; color: var(--text);\r\n}\r\n.faq-icon {\r\n  width: 24px; height: 24px; position: relative;\r\n  transition: transform .3s ease;\r\n}\r\n.faq-icon::before, .faq-icon::after {\r\n  content: ''; position: absolute; background: currentColor; top: 50%; left: 50%; transform: translate(-50%, -50%);\r\n}\r\n.faq-icon::before { width: 14px; height: 2px; }\r\n.faq-icon::after { width: 2px; height: 14px; }\r\n.faq-item.active .faq-icon { transform: rotate(45deg); }\r\n.faq-content { max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s ease; padding: 0 24px; color: var(--muted); line-height: 1.6; }\r\n.faq-item.active .faq-content { max-height: 200px; padding-bottom: 20px; }\r\n\r\n/* 02: Bento FAQ */\r\n.faq-bento { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }\r\n.faq-b-card { padding: 24px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 20px; }\r\n.faq-b-card.main { grid-row: span 2; background: var(--accent); color: #fff; }\r\n.faq-b-card.main p { color: rgba(255,255,255,0.8); }\r\n.faq-b-card h3 { margin: 0 0 10px; font-size: 18px; }\r\n.faq-b-card p { margin: 0; font-size: 14px; color: var(--muted); }\r\n\r\n/* 03: Minimalist List */\r\n.faq-minimal { display: flex; flex-direction: column; gap: 30px; }\r\n.faq-m-item h4 { margin: 0 0 10px; font-size: 20px; }\r\n.faq-m-item p { margin: 0; color: var(--muted); font-size: 16px; border-left: 3px solid var(--accent); padding-left: 20px; }\r\n\r\n/* 04: Two Column Grid */\r\n.faq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }\r\n.faq-g-item h5 { margin: 0 0 10px; font-size: 18px; color: var(--accent); }\r\n.faq-g-item p { margin: 0; color: var(--muted); font-size: 15px; }\r\n\r\n/* 05: Glassmorphic FAQ */\r\n.faq-glass { display: flex; flex-direction: column; gap: 20px; }\r\n.faq-g-card {\r\n  background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);\r\n  border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; color: #fff;\r\n}\r\n.faq-g-header { font-weight: 700; font-size: 18px; margin-bottom: 8px; }\r\n.faq-g-body { opacity: 0.8; font-size: 15px; }\r\n\r\n/* 06: Search UI */\r\n.faq-search-ui { text-align: center; }\r\n.search-box { display: flex; gap: 10px; max-width: 500px; margin: 0 auto 20px; }\r\n.search-box input {\r\n  flex: 1; padding: 12px 20px; border-radius: 99px; border: 1px solid var(--line);\r\n  background: var(--bg-2); color: var(--text);\r\n}\r\n.search-box button {\r\n  padding: 0 24px; border-radius: 99px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;\r\n}\r\n.quick-tags { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }\r\n.quick-tags span {\r\n  padding: 6px 14px; border-radius: 99px; border: 1px solid var(--line); font-size: 12px; font-weight: 600; cursor: pointer; transition: .2s;\r\n}\r\n.quick-tags span:hover { background: var(--accent); border-color: var(--accent); color: #fff; }\r\n\r\n/* 07: Bordered Clean */\r\n.faq-bordered { display: flex; flex-direction: column; }\r\n.faq-br-item { padding: 24px 0; border-bottom: 1px solid var(--line); }\r\n.faq-br-item:last-child { border-bottom: none; }\r\n.faq-br-q { font-weight: 700; font-size: 18px; margin-bottom: 10px; }\r\n.faq-br-a { color: var(--muted); line-height: 1.6; }\r\n\r\n/* 08: Sidebar FAQ */\r\n.faq-sidebar-layout { display: flex; gap: 40px; }\r\n.faq-aside { width: 200px; }\r\n.faq-aside nav { display: flex; flex-direction: column; gap: 10px; }\r\n.faq-aside a {\r\n  text-decoration: none; color: var(--muted); font-weight: 600; font-size: 15px;\r\n  padding: 10px 15px; border-radius: 10px; transition: .2s;\r\n}\r\n.faq-aside a.active, .faq-aside a:hover { background: var(--line); color: var(--text); }\r\n.faq-main-content h3 { margin: 0 0 10px; }\r\n\r\n/* 09: Boxed with Icons */\r\n.faq-icons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\r\n.faq-i-box { padding: 30px; border-radius: 24px; background: var(--bg-2); border: 1px solid var(--line); }\r\n.faq-i-icon { font-size: 32px; margin-bottom: 15px; }\r\n.faq-i-box h4 { margin: 0 0 10px; font-size: 20px; }\r\n.faq-i-box p { margin: 0; color: var(--muted); }\r\n\r\n/* 10: Steps */\r\n.faq-steps { display: flex; flex-direction: column; gap: 30px; }\r\n.faq-step { display: flex; gap: 20px; align-items: flex-start; }\r\n.step-num {\r\n  width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff;\r\n  display: grid; place-items: center; font-weight: 800; font-size: 14px; flex-shrink: 0;\r\n}\r\n.faq-step h5 { margin: 0 0 5px; font-size: 18px; }\r\n.faq-step p { margin: 0; color: var(--muted); }\r\n\r\n@media (max-width: 768px) {\r\n  .faq-bento, .faq-grid, .faq-icons-grid { grid-template-columns: 1fr; }\r\n  .faq-sidebar-layout { flex-direction: column; }\r\n  .faq-aside { width: 100%; }\r\n  .faq-aside nav { flex-direction: row; overflow-x: auto; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n\r\n.gallery-footer { padding: 60px 0; text-align: center; color: var(--muted); border-top: 1px solid var(--line); margin-top: 60px; }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\n  const THEME_KEY = 'premium-theme';\n  const themeBtn = document.querySelector('[data-theme-toggle]');\n  const html = document.documentElement;\n  const saved = localStorage.getItem(THEME_KEY);\n  if (saved) {\n    html.setAttribute('data-theme', saved);\n  }\n\n  if (themeBtn) {\n    themeBtn.addEventListener('click', () => {\n      const currentTheme = html.getAttribute('data-theme');\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\n      html.setAttribute('data-theme', newTheme);\n      localStorage.setItem(THEME_KEY, newTheme);\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\n    });\n  }\n\n  const faqTriggers = document.querySelectorAll('.faq-trigger');\n  faqTriggers.forEach((trigger) => {\n    trigger.addEventListener('click', () => {\n      const item = trigger.parentElement;\n      const isActive = item.classList.contains('active');\n      document.querySelectorAll('.faq-item').forEach((node) => node.classList.remove('active'));\n      if (!isActive) item.classList.add('active');\n    });\n  });\n\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach((entry) => {\n      if (entry.isIntersecting) entry.target.classList.add('active');\n    });\n  }, { threshold: 0.1 });\n\n  document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));\n\n  document.querySelectorAll('a[target=\"_blank\"]').forEach((anchor) => {\n    if (!anchor.hasAttribute('rel')) {\n      anchor.setAttribute('rel', 'noopener noreferrer');\n    }\n  });\n\n  document.querySelectorAll('img').forEach((img, index) => {\n    if (!img.hasAttribute('loading')) {\n      img.loading = index === 0 ? 'eager' : 'lazy';\n    }\n    if (!img.hasAttribute('decoding')) {\n      img.decoding = 'async';\n    }\n  });\n});\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
