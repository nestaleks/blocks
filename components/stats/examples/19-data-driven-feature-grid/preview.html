<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal" id="stats-01">
        <div class="block__label"><span>Example 01</span><span>Data-Driven Feature Grid</span></div>
        <div class="demo">
          <div class="stats-big">
            <div class="stat-item">
              <span class="count" data-target="99">0</span><span class="suffix">%</span>
              <p>Customer satisfaction rate</p>
            </div>
            <div class="stat-item">
              <span class="count" data-target="150">0</span><span class="suffix">k+</span>
              <p>Active daily users</p>
            </div>
            <div class="stat-item">
              <span class="count" data-target="24">0</span><span class="suffix">/7</span>
              <p>Premium support</p>
            </div>
          </div>
        </div>
      </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
