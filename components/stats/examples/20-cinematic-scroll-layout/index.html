<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Scroll Layout</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Stats / Cinematic Scroll Layout</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"stats-01\">\r\n        <div class=\"block__label\"><span>Example 01</span><span>Cinematic Scroll Layout</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"stats-big\">\r\n            <div class=\"stat-item\">\r\n              <span class=\"count\" data-target=\"99\">0</span><span class=\"suffix\">%</span>\r\n              <p>Customer satisfaction rate</p>\r\n            </div>\r\n            <div class=\"stat-item\">\r\n              <span class=\"count\" data-target=\"150\">0</span><span class=\"suffix\">k+</span>\r\n              <p>Active daily users</p>\r\n            </div>\r\n            <div class=\"stat-item\">\r\n              <span class=\"count\" data-target=\"24\">0</span><span class=\"suffix\">/7</span>\r\n              <p>Premium support</p>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- STATS STYLES --- */\r\n\r\n/* 01: Cinematic Scroll Layout */\r\n.stats-big { display: flex; justify-content: space-around; text-align: center; gap: 20px; }\r\n.stat-item .count { font-size: clamp(40px, 8vw, 80px); font-weight: 900; color: var(--accent); }\r\n.stat-item .suffix { font-size: clamp(24px, 4vw, 40px); font-weight: 900; color: var(--accent); opacity: 0.6; }\r\n.stat-item p { margin: 10px 0 0; font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }\r\n\r\n/* 02: Bento Stats */\r\n.stats-bento { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }\r\n.stat-b-card { padding: 30px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 24px; }\r\n.stat-b-card.accent { background: var(--accent); color: #fff; grid-row: span 2; display: flex; flex-direction: column; justify-content: center; }\r\n.stat-b-card.accent p { color: rgba(255,255,255,0.8); }\r\n.stat-b-card.wide { grid-column: span 2; }\r\n.stat-b-card h3 { margin: 0 0 10px; font-size: 32px; font-weight: 900; }\r\n.stat-b-card p { margin: 0; font-size: 15px; color: var(--muted); }\r\n\r\n/* 03: Glass Floating */\r\n.stats-glass { display: flex; gap: 30px; justify-content: center; }\r\n.stat-g-item {\r\n  padding: 30px 50px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);\r\n  border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; text-align: center; color: #fff;\r\n}\r\n.stat-g-item h4 { margin: 0; font-size: 40px; font-weight: 900; }\r\n.stat-g-item p { margin: 5px 0 0; opacity: 0.7; font-weight: 600; text-transform: uppercase; font-size: 12px; }\r\n\r\n/* 04: Minimalist Bar */\r\n.stats-bar { display: flex; align-items: center; justify-content: center; gap: 40px; padding: 20px; background: var(--bg-2); border-radius: 20px; border: 1px solid var(--line); }\r\n.stat-bar-item { text-align: center; }\r\n.stat-bar-item .val { display: block; font-size: 24px; font-weight: 900; }\r\n.stat-bar-item .lbl { font-size: 12px; color: var(--muted); font-weight: 600; }\r\n.stat-bar-divider { width: 1px; height: 40px; background: var(--line); }\r\n\r\n/* 05: Icons */\r\n.stats-icons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\r\n.stat-i-item { text-align: center; padding: 30px; border-radius: 24px; border: 1px solid var(--line); transition: .3s; }\r\n.stat-i-item:hover { transform: translateY(-5px); border-color: var(--accent); }\r\n.stat-i-icon { font-size: 40px; margin-bottom: 15px; }\r\n.stat-i-item h4 { margin: 0 0 5px; font-size: 20px; }\r\n.stat-i-item p { margin: 0; color: var(--muted); font-size: 14px; }\r\n\r\n/* 06: Brutalist */\r\n.stats-brutal { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\r\n.stat-br-box { padding: 40px; border: 4px solid #fff; text-align: center; }\r\n.stat-br-box.color-1 { background: var(--accent); }\r\n.stat-br-box.color-2 { background: var(--accent-2); }\r\n.stat-br-box h2 { margin: 0; font-size: 50px; font-weight: 900; color: #000; }\r\n.stat-br-box p { margin: 5px 0 0; font-weight: 900; color: #000; font-size: 14px; }\r\n\r\n/* 07: Progress */\r\n.stats-progress { display: flex; flex-direction: column; gap: 20px; }\r\n.prog-item { width: 100%; }\r\n.prog-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 14px; }\r\n.prog-bar { height: 8px; background: var(--line); border-radius: 10px; overflow: hidden; }\r\n.prog-fill { height: 100%; background: var(--accent); border-radius: 10px; }\r\n\r\n/* 08: Circles */\r\n.stats-circles { display: flex; gap: 40px; justify-content: center; }\r\n.circle-item { text-align: center; }\r\n.circle-box {\r\n  width: 100px; height: 100px; border: 8px solid var(--line); border-top-color: var(--accent-2);\r\n  border-radius: 50%; display: grid; place-items: center; margin: 0 auto 10px;\r\n  font-weight: 900; font-size: 20px;\r\n}\r\n.circle-box.accent { border-top-color: var(--accent); }\r\n\r\n/* 09: Table */\r\n.stats-table { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }\r\n.stat-t-row { display: flex; justify-content: space-between; padding: 20px 30px; border-bottom: 1px solid var(--line); background: var(--bg-2); }\r\n.stat-t-row:last-child { border-bottom: none; }\r\n.stat-val { font-weight: 800; color: var(--accent); }\r\n\r\n/* 10: Yearly */\r\n.stats-yearly { display: flex; align-items: center; justify-content: center; gap: 30px; }\r\n.year-item { padding: 20px 30px; border-radius: 20px; background: var(--bg-2); border: 1px solid var(--line); text-align: center; }\r\n.year-item.active { border-color: var(--accent); border-width: 2px; }\r\n.year-item .year { display: block; font-size: 12px; color: var(--muted); font-weight: 700; }\r\n.year-item .y-val { font-size: 24px; font-weight: 900; }\r\n.year-arrow { font-size: 32px; color: var(--line); }\r\n\r\n@media (max-width: 768px) {\r\n  .stats-big, .stats-bento, .stats-icons, .stats-brutal, .stats-circles { grid-template-columns: 1fr; flex-direction: column; }\r\n  .stat-b-card.wide { grid-column: auto; }\r\n  .stats-bar { flex-direction: column; gap: 20px; }\r\n  .stat-bar-divider { width: 40px; height: 1px; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n\r\n.gallery-footer { padding: 60px 0; text-align: center; color: var(--muted); border-top: 1px solid var(--line); margin-top: 60px; }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\n  const THEME_KEY = 'premium-theme';\n  const themeBtn = document.querySelector('[data-theme-toggle]');\n  const html = document.documentElement;\n  const saved = localStorage.getItem(THEME_KEY);\n  if (saved) {\n    html.setAttribute('data-theme', saved);\n  }\n\n  if (themeBtn) {\n    themeBtn.addEventListener('click', () => {\n      const currentTheme = html.getAttribute('data-theme');\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\n      html.setAttribute('data-theme', newTheme);\n      localStorage.setItem(THEME_KEY, newTheme);\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\n    });\n  }\n\n  const counters = document.querySelectorAll('.count');\n  let countersAnimated = false;\n\n  const animateCounters = () => {\n    counters.forEach((counter) => {\n      const target = Number(counter.getAttribute('data-target'));\n      const speed = 200;\n      const step = Math.max(1, Math.ceil(target / speed));\n      let current = 0;\n      const tick = () => {\n        current += step;\n        counter.innerText = String(Math.min(current, target));\n        if (current < target) {\n          window.requestAnimationFrame(tick);\n        }\n      };\n      tick();\n    });\n  };\n\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach((entry) => {\n      if (!entry.isIntersecting) return;\n      entry.target.classList.add('active');\n      if (!countersAnimated && entry.target.id === 'stats-01') {\n        countersAnimated = true;\n        animateCounters();\n      }\n    });\n  }, { threshold: 0.1 });\n\n  document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));\n\n  document.querySelectorAll('a[target=\"_blank\"]').forEach((anchor) => {\n    if (!anchor.hasAttribute('rel')) {\n      anchor.setAttribute('rel', 'noopener noreferrer');\n    }\n  });\n\n  document.querySelectorAll('img').forEach((img, index) => {\n    if (!img.hasAttribute('loading')) {\n      img.loading = index === 0 ? 'eager' : 'lazy';\n    }\n    if (!img.hasAttribute('decoding')) {\n      img.decoding = 'async';\n    }\n  });\n});\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
