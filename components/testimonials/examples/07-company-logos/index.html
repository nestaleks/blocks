<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company logos - Testimonials</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Testimonials / Company logos</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\">\n  <div class=\"block__label\"><span>Example 07</span><span>Company logos</span></div>\n  <div class=\"demo\"><section class=\"test t-logos\"><h2>Trusted by leading brands.</h2><div class=\"logo-grid\"><span>ACME</span><span>NOVA</span><span>ORBIT</span><span>VELA</span><span>MONO</span><span>ATLAS</span></div></section></div>\n</article>","css":":root {\n  --bg: #f5f3ee;\n  --bg-2: #ffffff;\n  --text: #151515;\n  --muted: #67645f;\n  --line: rgba(20,20,20,.12);\n  --card: rgba(255,255,255,.72);\n  --card-solid: #ffffff;\n  --accent: #a36bff;\n  --accent-2: #ffb86b;\n  --accent-3: #4ed6b8;\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\n  --radius: 28px;\n}\n\n:root[data-theme=\"dark\"] {\n  --bg: #0a0b10;\n  --bg-2: #11131c;\n  --text: #f7f4ee;\n  --muted: #aaa7b7;\n  --line: rgba(255,255,255,.14);\n  --card: rgba(255,255,255,.08);\n  --card-solid: #151823;\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  margin: 0;\n  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  color: var(--text);\n  background:\n    radial-gradient(circle at top left, rgba(163,107,255,.20), transparent 36rem),\n    radial-gradient(circle at 85% 10%, rgba(78,214,184,.14), transparent 32rem),\n    var(--bg);\n}\na { color: inherit; text-decoration: none; }\nbutton, input { font: inherit; }\nimg { max-width: 100%; display: block; }\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  backdrop-filter: blur(18px);\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\n  border-bottom: 1px solid var(--line);\n}\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:-.04em; }\n.logo span:first-child {\n  width:38px; height:38px; border-radius:14px;\n  display:grid; place-items:center;\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\n  box-shadow: 0 14px 40px rgba(163,107,255,.35);\n}\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\n.theme-btn, .pill-btn {\n  border:1px solid var(--line);\n  color:var(--text);\n  background:var(--card);\n  border-radius:999px;\n  padding:10px 14px;\n  cursor:pointer;\n  box-shadow: 0 10px 28px rgba(0,0,0,.05);\n}\n.intro { padding: 72px 0 42px; }\n.kicker {\n  display:inline-flex; gap:8px; align-items:center;\n  border:1px solid var(--line);\n  background:var(--card);\n  border-radius:999px;\n  padding:8px 12px;\n  color:var(--muted);\n  font-size:13px;\n  font-weight:700;\n}\nh1 {\n  margin:18px 0 14px;\n  font-size: clamp(42px, 8vw, 92px);\n  line-height:.92;\n  letter-spacing:-.075em;\n}\n.intro p { max-width:760px; color:var(--muted); font-size: clamp(17px, 2vw, 21px); line-height:1.7; }\n.grid { display:grid; gap:28px; padding:28px 0 90px; }\n.block {\n  overflow:hidden;\n  border:1px solid var(--line);\n  border-radius: calc(var(--radius) + 8px);\n  background: var(--card);\n  box-shadow: var(--shadow);\n  backdrop-filter: blur(18px);\n}\n.block__label {\n  display:flex; justify-content:space-between; align-items:center; gap:16px;\n  padding:14px 18px; border-bottom:1px solid var(--line);\n  color:var(--muted); font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.12em;\n}\n.demo { padding: clamp(22px, 4vw, 44px); }\n.badge {\n  display:inline-flex; align-items:center; gap:8px;\n  font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;\n  color:var(--muted);\n  border:1px solid var(--line);\n  padding:7px 10px; border-radius:999px;\n  background:rgba(255,255,255,.08);\n}\n.btn-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; }\n.btn {\n  border:1px solid var(--line);\n  border-radius:999px;\n  padding:12px 17px;\n  font-weight:850;\n  background:var(--text);\n  color:var(--bg);\n  display:inline-flex; gap:8px; align-items:center;\n}\n.btn.secondary { background:transparent; color:var(--text); }\n.reveal { opacity:0; transform: translateY(24px); transition: .7s ease; }\n.reveal.is-visible { opacity:1; transform:none; }\n.footer-note { padding: 28px 0 60px; color:var(--muted); text-align:center; }\n@media (max-width: 780px) {\n  .nav { display:none; }\n  .topbar__inner { min-height:64px; }\n  .intro { padding:42px 0 20px; }\n  h1 { font-size: clamp(38px, 15vw, 58px); }\n  .demo { padding:22px; }\n  .block__label { align-items:flex-start; flex-direction:column; gap:6px; }\n}\n\n\n.test { border-radius:30px; padding:clamp(24px,5vw,54px); background:var(--card-solid); border:1px solid var(--line); }\n.test h2 { margin:0 0 22px; font-size:clamp(32px,5vw,62px); line-height:1; letter-spacing:-.06em; }\n.t-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }\n.t-grid article { padding:24px; border-radius:24px; background:var(--bg); color:var(--text); line-height:1.7; }\n.t-grid .wide { grid-column:1/-1; }\n.t-grid b { display:block; margin-top:18px; }\n.t-wall { text-align:center; background:linear-gradient(135deg, rgba(78,214,184,.16), rgba(163,107,255,.12)), var(--card-solid); }\n.avatars { display:flex; justify-content:center; margin-bottom:22px; }\n.avatars span { width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:var(--text);color:var(--bg);border:3px solid var(--bg);margin-left:-10px;font-weight:900; }\n.t-split { display:grid; grid-template-columns:1.4fr .8fr; gap:28px; align-items:end; }\n.t-split aside { padding:24px; border-radius:24px; background:var(--bg); }\n\n/* New testimonial variants */\n.t-video .t-grid { grid-template-columns:1fr; }\n.t-video small { color:var(--muted); display:block; margin-top:8px; }\n\n.t-stars .stars { color:#d8b46a; font-size:20px; margin-bottom:8px; }\n\n.t-minimal blockquote { font-size:24px; line-height:1.5; font-style:italic; text-align:center; padding:40px; border-left:4px solid var(--accent); background:var(--bg); border-radius:16px; }\n.t-minimal cite { display:block; margin-top:16px; font-style:normal; font-weight:600; }\n\n.t-logos .logo-grid { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }\n.t-logos span { padding:12px 24px; border-radius:999px; background:var(--bg); border:1px solid var(--line); font-weight:800; }\n\n.t-case { display:grid; grid-template-columns:1.2fr .8fr; gap:28px; align-items:start; }\n.t-case aside { padding:24px; border-radius:24px; background:var(--bg); }\n.t-case p { margin:8px 0; }\n\n.text-link { font-weight:800; border-bottom:1px solid currentColor; }\n\n/* Even More Testimonials */\n.t-masonry { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n.t-masonry article { background: var(--card-solid); border: 1px solid var(--line); border-radius: 24px; padding: 24px; break-inside: avoid; margin-bottom: 16px; }\n.t-masonry .tall { padding-bottom: 80px; }\n.t-bubble-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n.t-bubble { position: relative; background: var(--accent); color: #fff; padding: 24px; border-radius: 24px; }\n.t-bubble:after { content: \"\"; position: absolute; bottom: -10px; left: 30px; border-width: 10px 10px 0; border-style: solid; border-color: var(--accent) transparent transparent; }\n.t-glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 32px; padding: 40px; color: var(--text); }\n.t-avatar-large { text-align: center; }\n.t-avatar-large img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); margin-bottom: 20px; }\n.t-avatar-large blockquote { font-size: 28px; font-weight: 500; line-height: 1.4; margin: 0 0 20px; }\n.t-simple-slider { display: flex; overflow-x: auto; gap: 20px; padding: 20px 0; scroll-snap-type: x mandatory; }\n.t-simple-slider article { flex: 0 0 300px; scroll-snap-align: start; padding: 24px; background: var(--bg); border-radius: 20px; }\n\n@media (max-width:760px){\n  .t-grid,.t-split,.t-case{grid-template-columns:1fr}\n  .test h2{font-size:36px}\n  .t-minimal blockquote{font-size:20px;padding:24px}\n}","js":"const themeBtn = document.querySelector('[data-theme-toggle]');\nconst root = document.documentElement;\nconst savedTheme = localStorage.getItem('premium-block-theme');\nif (savedTheme) root.dataset.theme = savedTheme;\n\nthemeBtn?.addEventListener('click', () => {\n  const next = root.dataset.theme === 'dark' ? 'light' : 'dark';\n  root.dataset.theme = next;\n  localStorage.setItem('premium-block-theme', next);\n});\n\nconst revealItems = document.querySelectorAll('.reveal');\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach((entry) => {\n    if (entry.isIntersecting) {\n      entry.target.classList.add('is-visible');\n      io.unobserve(entry.target);\n    }\n  });\n}, { threshold: 0.16 });\nrevealItems.forEach((item) => io.observe(item));\n\ndocument.querySelectorAll('[data-menu]').forEach((btn) => {\n  btn.addEventListener('click', () => {\n    btn.closest('.block')?.classList.toggle('menu-open');\n  });\n});"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
