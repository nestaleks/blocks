<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split Layout - Team</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Team / Split Layout</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"team-07\">\r\n        <div class=\"block__label\"><span>Example 07</span><span>Split Layout</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"team-split\">\r\n            <div class=\"team-s-img\"><img src=\"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=600&h=800&fit=crop\" alt=\"\"></div>\r\n            <div class=\"team-s-info\">\r\n              <span class=\"eyebrow\">Meet our Lead</span>\r\n              <h2>James Wilson</h2>\r\n              <p>With over 15 years of experience in architectural design and urban planning.</p>\r\n              <div class=\"team-s-social\">LinkedIn / Twitter / Portfolio</div>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- TEAM STYLES --- */\r\n\r\n/* 01: Modern Grid */\r\n.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\r\n.team-card { border-radius: 20px; overflow: hidden; background: var(--bg-2); border: 1px solid var(--line); }\r\n.team-img img { width: 100%; height: 300px; object-fit: cover; display: block; }\r\n.team-info { padding: 20px; }\r\n.team-info h4 { margin: 0 0 5px; font-size: 18px; }\r\n.team-info p { margin: 0; color: var(--muted); font-size: 14px; }\r\n\r\n/* 02: Bento Team */\r\n.team-bento { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 200px); gap: 15px; }\r\n.team-b-card { position: relative; border-radius: 24px; overflow: hidden; border: 1px solid var(--line); }\r\n.team-b-card.main { grid-column: span 2; grid-row: span 2; }\r\n.team-b-img img { width: 100%; height: 100%; object-fit: cover; display: block; }\r\n.team-b-overlay {\r\n  position: absolute; bottom: 0; left: 0; right: 0; padding: 30px;\r\n  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: #fff;\r\n}\r\n.team-b-info { padding: 15px; background: var(--bg-2); }\r\n.team-b-info h4 { margin: 0; font-size: 16px; }\r\n.team-b-info p { margin: 5px 0 0; font-size: 12px; color: var(--muted); }\r\n\r\n/* 03: Circles */\r\n.team-circles { display: flex; gap: 40px; justify-content: center; }\r\n.team-c-item { text-align: center; }\r\n.team-c-item img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid var(--accent); }\r\n.team-c-item h4 { margin: 0; }\r\n\r\n/* 04: Minimal List */\r\n.team-list { display: flex; flex-direction: column; gap: 20px; }\r\n.team-l-item { display: flex; align-items: center; gap: 40px; padding: 20px; border-radius: 16px; background: var(--bg-2); border: 1px solid var(--line); }\r\n.role { font-size: 11px; font-weight: 900; text-transform: uppercase; color: var(--accent); width: 100px; }\r\n.team-l-item h3 { margin: 0; flex: 1; }\r\n.team-l-item p { margin: 0; color: var(--muted); }\r\n\r\n/* 05: Hover Reveal */\r\n.team-h-card { position: relative; width: 300px; border-radius: 20px; overflow: hidden; margin: 0 auto; cursor: pointer; }\r\n.team-h-card img { width: 100%; display: block; filter: grayscale(1); transition: .5s; }\r\n.team-h-info {\r\n  position: absolute; inset: 0; background: rgba(163, 107, 255, 0.9);\r\n  display: flex; flex-direction: column; align-items: center; justify-content: center;\r\n  color: #fff; opacity: 0; transition: .4s; transform: translateY(20px);\r\n}\r\n.team-h-card:hover img { filter: grayscale(0); transform: scale(1.05); }\r\n.team-h-card:hover .team-h-info { opacity: 1; transform: translateY(0); }\r\n\r\n/* 06: Brutalist */\r\n.team-brutal { display: flex; justify-content: center; }\r\n.team-br-card { width: 300px; border: 4px solid #fff; background: #fff; box-shadow: 10px 10px 0 var(--accent); }\r\n.team-br-img img { width: 100%; display: block; }\r\n.team-br-content { padding: 20px; color: #000; }\r\n.team-br-content h3 { margin: 0; text-transform: uppercase; font-weight: 900; }\r\n\r\n/* 07: Split */\r\n.team-split { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; align-items: center; }\r\n.team-s-img img { width: 100%; border-radius: 24px; }\r\n.eyebrow { color: var(--accent); font-weight: 800; font-size: 14px; text-transform: uppercase; }\r\n.team-s-info h2 { margin: 10px 0; font-size: 42px; }\r\n.team-s-social { margin-top: 30px; font-weight: 600; color: var(--muted); }\r\n\r\n/* 08: Floating */\r\n.team-floating { display: flex; justify-content: center; }\r\n.team-f-card {\r\n  display: flex; align-items: center; gap: 20px; padding: 15px;\r\n  background: var(--bg-2); border-radius: 100px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);\r\n  border: 1px solid var(--line);\r\n}\r\n.team-f-card img { width: 60px; height: 60px; border-radius: 50%; }\r\n.team-f-text h4 { margin: 0; }\r\n.team-f-text p { margin: 0; font-size: 12px; color: var(--muted); }\r\n\r\n/* 09: Table */\r\n.team-table { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--bg-2); }\r\n.team-t-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px 25px; border-bottom: 1px solid var(--line); align-items: center; }\r\n.team-t-row.header { background: var(--bg); font-weight: 800; font-size: 13px; text-transform: uppercase; }\r\n.t-name { display: flex; align-items: center; gap: 12px; font-weight: 600; }\r\n.t-name img { width: 32px; height: 32px; border-radius: 50%; }\r\n\r\n/* 10: Glass Flip */\r\n.team-glass { display: flex; justify-content: center; }\r\n.team-g-card {\r\n  padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.1);\r\n  backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);\r\n  text-align: center; color: #fff; width: 300px;\r\n}\r\n.team-g-card img { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 20px; }\r\n\r\n@media (max-width: 768px) {\r\n  .team-grid, .team-bento, .team-split, .team-t-row { grid-template-columns: 1fr; }\r\n  .team-bento { grid-template-rows: auto; }\r\n  .team-l-item { flex-direction: column; text-align: center; gap: 10px; }\r\n  .team-t-row { gap: 10px; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n\r\n.gallery-footer { padding: 60px 0; text-align: center; color: var(--muted); border-top: 1px solid var(--line); margin-top: 60px; }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\r\n  // Theme Toggle\r\n  const themeBtn = document.querySelector('[data-theme-toggle]');\r\n  const html = document.documentElement;\r\n\r\n  if (themeBtn) {\r\n    themeBtn.addEventListener('click', () => {\r\n      const currentTheme = html.getAttribute('data-theme');\r\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\r\n      html.setAttribute('data-theme', newTheme);\r\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\r\n    });\r\n  }\r\n\r\n  // Intersection Observer for Reveal\r\n  const observerOptions = {\r\n    threshold: 0.1\r\n  };\r\n\r\n  const observer = new IntersectionObserver((entries) => {\r\n    entries.forEach(entry => {\r\n      if (entry.isIntersecting) {\r\n        entry.target.classList.add('active');\r\n      }\r\n    });\r\n  }, observerOptions);\r\n\r\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\r\n});\r\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
