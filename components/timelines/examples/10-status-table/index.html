<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Table - Timelines</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Timelines / Status Table</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"tm-10\">\r\n        <div class=\"block__label\"><span>Example 10</span><span>Status Table</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"tm-table\">\r\n            <div class=\"tm-t-row header\">\r\n              <span>Timeline</span>\r\n              <span>Milestone</span>\r\n              <span>Status</span>\r\n            </div>\r\n            <div class=\"tm-t-row\">\r\n              <span>Q1 2024</span>\r\n              <span>Global expansion</span>\r\n              <span class=\"s-tag done\">Completed</span>\r\n            </div>\r\n            <div class=\"tm-t-row\">\r\n              <span>Q2 2024</span>\r\n              <span>Feature ecosystem</span>\r\n              <span class=\"s-tag active\">In Progress</span>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- TIMELINE STYLES --- */\r\n\r\n/* 01: Vertical Minimalist */\r\n.tm-vertical { position: relative; padding-left: 32px; border-left: 2px solid var(--line); margin-left: 10px; }\r\n.tm-item { position: relative; margin-bottom: 40px; }\r\n.tm-item:last-child { margin-bottom: 0; }\r\n.tm-dot {\r\n  position: absolute; left: -42px; top: 6px;\r\n  width: 18px; height: 18px; border-radius: 50%;\r\n  background: var(--bg); border: 4px solid var(--accent);\r\n}\r\n.tm-date { font-size: 13px; font-weight: 800; color: var(--accent); }\r\n.tm-content h3 { margin: 8px 0 4px; font-size: 20px; }\r\n.tm-content p { margin: 0; color: var(--muted); font-size: 15px; }\r\n\r\n/* 02: Roadmap Progress */\r\n.tm-roadmap { display: flex; flex-direction: column; gap: 16px; }\r\n.tm-r-item {\r\n  padding: 24px; border-radius: 20px; border: 1px solid var(--line);\r\n  background: var(--bg-2); position: relative;\r\n}\r\n.tm-r-item.done { border-color: var(--accent-2); background: rgba(255,184,107,0.05); }\r\n.tm-r-item.active { border-color: var(--accent); border-width: 2px; }\r\n.tm-r-status { font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; color: var(--muted); }\r\n.tm-r-item.done .tm-r-status { color: var(--accent-2); }\r\n.tm-r-item.active .tm-r-status { color: var(--accent); }\r\n.tm-r-item h4 { margin: 0 0 4px; font-size: 18px; }\r\n.tm-r-item p { margin: 0; color: var(--muted); font-size: 14px; }\r\n\r\n/* 03: Glassmorphic */\r\n.tm-glass { display: flex; flex-direction: column; gap: 30px; align-items: center; }\r\n.tm-g-card {\r\n  background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);\r\n  border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;\r\n  padding: 30px; width: min(400px, 100%); color: #fff;\r\n}\r\n.tm-g-year { font-size: 32px; font-weight: 900; opacity: 0.5; }\r\n\r\n/* 04: Zig-Zag */\r\n.tm-zigzag { position: relative; }\r\n.tm-zigzag::before { content:''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }\r\n.tm-z-item { width: 50%; padding: 20px 40px; position: relative; }\r\n.tm-z-item.left { text-align: right; margin-right: auto; }\r\n.tm-z-item.right { text-align: left; margin-left: auto; }\r\n.tm-z-content { background: var(--bg-2); padding: 24px; border-radius: 20px; border: 1px solid var(--line); }\r\n\r\n/* 05: Brutalist */\r\n.tm-brutalist { display: flex; flex-direction: column; gap: 20px; }\r\n.tm-b-step { display: flex; gap: 20px; align-items: center; }\r\n.tm-b-num {\r\n  width: 60px; height: 60px; border: 4px solid #000; display: grid; place-items: center;\r\n  font-size: 24px; font-weight: 900; background: var(--accent); box-shadow: 6px 6px 0 #000;\r\n}\r\n.tm-b-info h3 { margin: 0; }\r\n\r\n/* 06: Dark Dual */\r\n.tm-dark-dual { padding: 40px; color: #fff; display: flex; flex-direction: column; gap: 30px; }\r\n.tm-d-row { display: grid; grid-template-columns: 1fr 50px 1fr; align-items: center; text-align: center; }\r\n.tm-d-center { display: grid; place-items: center; position: relative; height: 100%; }\r\n.tm-d-center::before { content:''; position: absolute; top:0; bottom:0; width:2px; background: rgba(255,255,255,0.2); }\r\n.tm-d-dot { width: 12px; height: 12px; background: #fff; border-radius: 50%; z-index: 1; }\r\n.tm-d-side { font-weight: 600; }\r\n\r\n/* 07: Gradient Line */\r\n.tm-grad-line { position: relative; padding: 20px 0; }\r\n.tm-gl-item { position: relative; padding-left: 40px; margin-bottom: 30px; }\r\n.tm-gl-item::before {\r\n  content: ''; position: absolute; left: 0; top: 0; bottom: -30px; width: 6px;\r\n  background: linear-gradient(to bottom, var(--accent), var(--accent-2)); border-radius: 10px;\r\n}\r\n.tm-gl-item:last-child::before { bottom: 0; }\r\n.tm-gl-box { background: var(--bg-2); padding: 20px; border-radius: 16px; border: 1px solid var(--line); }\r\n\r\n/* 08: Horizontal */\r\n.tm-horizontal { padding: 60px 0; position: relative; }\r\n.tm-h-track { height: 4px; background: var(--line); position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%); }\r\n.tm-h-nodes { display: flex; justify-content: space-between; position: relative; z-index: 1; }\r\n.tm-h-node { text-align: center; }\r\n.node-dot { width: 24px; height: 24px; background: var(--bg-2); border: 4px solid var(--line); border-radius: 50%; margin: 0 auto 12px; }\r\n.tm-h-node.active .node-dot { border-color: var(--accent); background: var(--accent); }\r\n.node-label { font-weight: 700; font-size: 14px; }\r\n\r\n/* 09: Abstract Nodes */\r\n.tm-abstract { display: flex; align-items: center; gap: 15px; justify-content: center; }\r\n.tm-a-node { padding: 15px 25px; background: var(--bg-2); border-radius: 100px; border: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }\r\n.tm-a-icon { color: var(--accent); font-weight: 900; }\r\n.tm-a-connector { width: 40px; height: 2px; background: dashed var(--line); border-top: 2px dashed var(--line); }\r\n\r\n/* 10: Table Timeline */\r\n.tm-table { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }\r\n.tm-t-row { display: grid; grid-template-columns: 120px 1fr 150px; padding: 16px 20px; border-bottom: 1px solid var(--line); align-items: center; }\r\n.tm-t-row:last-child { border-bottom: none; }\r\n.tm-t-row.header { background: var(--line); font-weight: 800; font-size: 13px; text-transform: uppercase; }\r\n.s-tag { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; text-align: center; }\r\n.s-tag.done { background: #e6fffa; color: #2c7a7b; }\r\n.s-tag.active { background: #ebf8ff; color: #2b6cb0; }\r\n\r\n@media (max-width: 768px) {\r\n  .tm-zigzag::before { left: 20px; }\r\n  .tm-z-item { width: 100%; padding-left: 50px; text-align: left !important; }\r\n  .tm-d-row { grid-template-columns: 1fr; gap: 10px; }\r\n  .tm-d-center { display: none; }\r\n  .tm-horizontal { overflow-x: auto; }\r\n  .tm-h-nodes { width: 500px; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\r\n  // Theme Toggle\r\n  const themeBtn = document.querySelector('[data-theme-toggle]');\r\n  const html = document.documentElement;\r\n\r\n  if (themeBtn) {\r\n    themeBtn.addEventListener('click', () => {\r\n      const currentTheme = html.getAttribute('data-theme');\r\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\r\n      html.setAttribute('data-theme', newTheme);\r\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\r\n    });\r\n  }\r\n\r\n  // Intersection Observer for Reveal\r\n  const observerOptions = {\r\n    threshold: 0.1\r\n  };\r\n\r\n  const observer = new IntersectionObserver((entries) => {\r\n    entries.forEach(entry => {\r\n      if (entry.isIntersecting) {\r\n        entry.target.classList.add('active');\r\n      }\r\n    });\r\n  }, observerOptions);\r\n\r\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\r\n});\r\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
