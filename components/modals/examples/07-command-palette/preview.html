<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal" id="modal-07">
        <div class="block__label"><span>Example 07</span><span>Command Palette</span></div>
        <div class="demo">
          <div class="modal-cmd">
            <div class="cmd-search">
              <span>🔍</span>
              <input type="text" placeholder="Type a command or search...">
              <span class="cmd-k">⌘K</span>
            </div>
            <div class="cmd-list">
              <div class="cmd-item"><span>🚀</span> Go to Dashboard</div>
              <div class="cmd-item"><span>⚙️</span> Settings</div>
              <div class="cmd-item"><span>👤</span> Profile</div>
            </div>
          </div>
        </div>
      </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
