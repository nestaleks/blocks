<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standard Dialog - Modals</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Modals / Standard Dialog</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"modal-01\">\r\n        <div class=\"block__label\"><span>Example 01</span><span>Standard Dialog</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"modal-static\">\r\n            <div class=\"m-header\">\r\n              <h3>Delete Project?</h3>\r\n              <button class=\"m-close\">&times;</button>\r\n            </div>\r\n            <div class=\"m-body\">\r\n              <p>Are you sure you want to delete this project? This action cannot be undone and all data will be lost.</p>\r\n            </div>\r\n            <div class=\"m-footer\">\r\n              <button class=\"btn-ghost\">Cancel</button>\r\n              <button class=\"btn-danger\">Delete Now</button>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- MODAL STYLES --- */\r\n\r\n/* 01: Standard */\r\n.modal-static { background: var(--bg-2); border-radius: 20px; border: 1px solid var(--line); max-width: 400px; margin: 0 auto; box-shadow: var(--shadow); }\r\n.m-header { padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }\r\n.m-header h3 { margin: 0; font-size: 18px; }\r\n.m-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); }\r\n.m-body { padding: 24px; color: var(--muted); font-size: 15px; }\r\n.m-footer { padding: 15px 24px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }\r\n.btn-ghost { background: none; border: 1px solid var(--line); padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }\r\n.btn-danger { background: #ff4d4f; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }\r\n\r\n/* 02: Cookie */\r\n.modal-bento-cookie { background: var(--bg-2); border-radius: 20px; border: 1px solid var(--line); padding: 20px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }\r\n.cookie-content h4 { margin: 0 0 5px; }\r\n.cookie-content p { margin: 0; font-size: 13px; color: var(--muted); }\r\n.cookie-actions { display: flex; gap: 10px; }\r\n.btn-sm { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--line); font-size: 13px; font-weight: 700; cursor: pointer; }\r\n.btn-sm.accent { background: var(--accent); color: #fff; border: none; }\r\n\r\n/* 03: Newsletter */\r\n.modal-newsletter { display: flex; background: var(--bg-2); border-radius: 24px; overflow: hidden; border: 1px solid var(--line); max-width: 600px; margin: 0 auto; }\r\n.m-side-img img { width: 240px; height: 100%; object-fit: cover; }\r\n.m-news-info { padding: 40px; flex: 1; }\r\n.m-news-info input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line); margin: 20px 0 10px; }\r\n.btn-full { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }\r\n\r\n/* 04: Glass */\r\n.modal-glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 40px; text-align: center; color: #fff; max-width: 350px; margin: 0 auto; }\r\n.m-g-icon { font-size: 40px; margin-bottom: 15px; }\r\n.btn-glass { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 12px 24px; border-radius: 99px; margin-top: 20px; cursor: pointer; font-weight: 600; }\r\n\r\n/* 05: Toast */\r\n.modal-toast { background: var(--bg-2); border-radius: 12px; border: 1px solid var(--line); padding: 15px 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: fit-content; margin: 0 auto; }\r\n.t-icon { font-size: 20px; }\r\n.t-text { display: flex; flex-direction: column; font-size: 14px; }\r\n.t-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }\r\n\r\n/* 06: Brutalist */\r\n.modal-brutal { border: 4px solid #fff; background: #fff; }\r\n.br-head { background: #000; color: #fff; padding: 10px 20px; font-weight: 900; }\r\n.br-content { padding: 30px; color: #000; text-align: center; font-weight: 900; }\r\n.br-btns { display: flex; gap: 10px; margin-top: 20px; }\r\n.br-btns button { flex: 1; padding: 12px; border: 3px solid #000; font-weight: 900; cursor: pointer; }\r\n.br-btns .yes { background: var(--accent); }\r\n\r\n/* 07: Command Palette */\r\n.modal-cmd { background: var(--bg-2); border-radius: 16px; border: 1px solid var(--line); max-width: 500px; margin: 0 auto; overflow: hidden; }\r\n.cmd-search { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--line); }\r\n.cmd-search input { flex: 1; border: none; background: none; font-size: 16px; color: var(--text); outline: none; }\r\n.cmd-k { font-size: 12px; color: var(--muted); background: var(--line); padding: 2px 6px; border-radius: 4px; }\r\n.cmd-item { padding: 12px 20px; font-size: 14px; cursor: pointer; display: flex; gap: 10px; }\r\n.cmd-item:hover { background: var(--line); }\r\n\r\n/* 08: Bottom Sheet */\r\n.modal-bottom-sheet { background: var(--bg-2); border-radius: 30px 30px 0 0; width: 100%; padding: 30px; border: 1px solid var(--line); border-bottom: none; }\r\n.sheet-handle { width: 40px; height: 5px; background: var(--line); border-radius: 10px; margin: 0 auto 20px; }\r\n.sheet-icons { display: flex; justify-content: space-around; margin-top: 30px; }\r\n\r\n/* 09: Fullscreen Nav */\r\n.modal-full-nav { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }\r\n.modal-full-nav nav { display: flex; flex-direction: column; gap: 20px; text-align: center; }\r\n.modal-full-nav a { color: #fff; font-size: 32px; font-weight: 900; text-decoration: none; }\r\n\r\n/* 10: Feedback */\r\n.modal-feedback { background: var(--bg-2); border-radius: 20px; border: 1px solid var(--line); padding: 25px; width: 300px; box-shadow: var(--shadow); }\r\n.ratings { display: flex; justify-content: space-between; font-size: 30px; margin: 20px 0; cursor: pointer; }\r\n\r\n@media (max-width: 768px) {\r\n  .modal-bento-cookie { flex-direction: column; text-align: center; }\r\n  .modal-newsletter { flex-direction: column; }\r\n  .m-side-img img { width: 100%; height: 150px; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n\r\n.gallery-footer { padding: 60px 0; text-align: center; color: var(--muted); border-top: 1px solid var(--line); margin-top: 60px; }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\r\n  // Theme Toggle\r\n  const themeBtn = document.querySelector('[data-theme-toggle]');\r\n  const html = document.documentElement;\r\n\r\n  if (themeBtn) {\r\n    themeBtn.addEventListener('click', () => {\r\n      const currentTheme = html.getAttribute('data-theme');\r\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\r\n      html.setAttribute('data-theme', newTheme);\r\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\r\n    });\r\n  }\r\n\r\n  // Intersection Observer for Reveal\r\n  const observerOptions = {\r\n    threshold: 0.1\r\n  };\r\n\r\n  const observer = new IntersectionObserver((entries) => {\r\n    entries.forEach(entry => {\r\n      if (entry.isIntersecting) {\r\n        entry.target.classList.add('active');\r\n      }\r\n    });\r\n  }, observerOptions);\r\n\r\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\r\n});\r\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
