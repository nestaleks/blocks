<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal" id="modal-01">
        <div class="block__label"><span>Example 01</span><span>Standard Dialog</span></div>
        <div class="demo">
          <div class="modal-static">
            <div class="m-header">
              <h3>Delete Project?</h3>
              <button class="m-close">&times;</button>
            </div>
            <div class="m-body">
              <p>Are you sure you want to delete this project? This action cannot be undone and all data will be lost.</p>
            </div>
            <div class="m-footer">
              <button class="btn-ghost">Cancel</button>
              <button class="btn-danger">Delete Now</button>
            </div>
          </div>
        </div>
      </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
