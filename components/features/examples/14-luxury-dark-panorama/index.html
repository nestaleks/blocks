<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxury Dark Panorama</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Features / Luxury Dark Panorama</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\">\n  <div class=\"block__label\"><span>Example 06</span><span>Luxury Dark Panorama</span></div>\n  <div class=\"demo\">\n    <div class=\"features\">\n      <h2>Power in every module</h2>\n      <div class=\"f-bento-grid\">\n        <div class=\"f-bento-item tall\">\n          <h3>Advanced AI</h3>\n          <p>The core of our platform</p>\n        </div>\n        <div class=\"f-bento-item wide\">\n          <h3>Global Edge</h3>\n          <p>Speed everywhere</p>\n        </div>\n        <div class=\"f-bento-item\">\n          <h3>Secure</h3>\n        </div>\n        <div class=\"f-bento-item\">\n          <h3>Open Source</h3>\n        </div>\n      </div>\n    </div>\n  </div>\n</article>","css":":root {\n  --bg: #f5f3ee;\n  --bg-2: #ffffff;\n  --text: #151515;\n  --muted: #67645f;\n  --line: rgba(20,20,20,.12);\n  --card: rgba(255,255,255,.72);\n  --card-solid: #ffffff;\n  --accent: #a36bff;\n  --accent-2: #ffb86b;\n  --accent-3: #4ed6b8;\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\n  --radius: 28px;\n}\n\n:root[data-theme=\"dark\"] {\n  --bg: #0a0b10;\n  --bg-2: #11131c;\n  --text: #f7f4ee;\n  --muted: #aaa7b7;\n  --line: rgba(255,255,255,.14);\n  --card: rgba(255,255,255,.08);\n  --card-solid: #151823;\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  margin: 0;\n  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  color: var(--text);\n  background:\n    radial-gradient(circle at top left, rgba(163,107,255,.20), transparent 36rem),\n    radial-gradient(circle at 85% 10%, rgba(78,214,184,.14), transparent 32rem),\n    var(--bg);\n}\na { color: inherit; text-decoration: none; }\nbutton, input { font: inherit; }\nimg { max-width: 100%; display: block; }\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  backdrop-filter: blur(18px);\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\n  border-bottom: 1px solid var(--line);\n}\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:-.04em; }\n.logo span:first-child {\n  width:38px; height:38px; border-radius:14px;\n  display:grid; place-items:center;\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\n  box-shadow: 0 14px 40px rgba(163,107,255,.35);\n}\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\n.theme-btn, .pill-btn {\n  border:1px solid var(--line);\n  color:var(--text);\n  background:var(--card);\n  border-radius:999px;\n  padding:10px 14px;\n  cursor:pointer;\n  box-shadow: 0 10px 28px rgba(0,0,0,.05);\n}\n.intro { padding: 72px 0 42px; }\n.kicker {\n  display:inline-flex; gap:8px; align-items:center;\n  border:1px solid var(--line);\n  background:var(--card);\n  border-radius:999px;\n  padding:8px 12px;\n  color:var(--muted);\n  font-size:13px;\n  font-weight:700;\n}\nh1 {\n  margin:18px 0 14px;\n  font-size: clamp(42px, 8vw, 92px);\n  line-height:.92;\n  letter-spacing:-.075em;\n}\n.intro p { max-width:760px; color:var(--muted); font-size: clamp(17px, 2vw, 21px); line-height:1.7; }\n.grid { display:grid; gap:28px; padding:28px 0 90px; }\n.block {\n  overflow:hidden;\n  border:1px solid var(--line);\n  border-radius: calc(var(--radius) + 8px);\n  background: var(--card);\n  box-shadow: var(--shadow);\n  backdrop-filter: blur(18px);\n}\n.block__label {\n  display:flex; justify-content:space-between; align-items:center; gap:16px;\n  padding:14px 18px; border-bottom:1px solid var(--line);\n  color:var(--muted); font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.12em;\n}\n.demo { padding: clamp(22px, 4vw, 44px); }\n.badge {\n  display:inline-flex; align-items:center; gap:8px;\n  font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;\n  color:var(--muted);\n  border:1px solid var(--line);\n  padding:7px 10px; border-radius:999px;\n  background:rgba(255,255,255,.08);\n}\n.btn-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; }\n.btn {\n  border:1px solid var(--line);\n  border-radius:999px;\n  padding:12px 17px;\n  font-weight:850;\n  background:var(--text);\n  color:var(--bg);\n  display:inline-flex; gap:8px; align-items:center;\n}\n.btn.secondary { background:transparent; color:var(--text); }\n.reveal { opacity:0; transform: translateY(24px); transition: .7s ease; }\n.reveal.is-visible { opacity:1; transform:none; }\n.footer-note { padding: 28px 0 60px; color:var(--muted); text-align:center; }\n@media (max-width: 780px) {\n  .nav { display:none; }\n  .topbar__inner { min-height:64px; }\n  .intro { padding:42px 0 20px; }\n  h1 { font-size: clamp(38px, 15vw, 58px); }\n  .demo { padding:22px; }\n  .block__label { align-items:flex-start; flex-direction:column; gap:6px; }\n}\n\n\n.features { border-radius:30px; padding:clamp(24px,5vw,54px); background:var(--card-solid); border:1px solid var(--line); }\n.features h2 { margin:0 0 24px; font-size:clamp(34px,5vw,64px); line-height:1; letter-spacing:-.06em; }\n.f-grid div { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }\n.f-grid article,.f-icons article { padding:24px; background:var(--bg); border-radius:24px; border:1px solid var(--line); }\n.f-grid b { color:var(--accent); }\n.features p,.features span { color:var(--muted); line-height:1.65; }\n.f-spot { display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:center; overflow:hidden; }\n.mock { min-height:320px; border-radius:28px; background:linear-gradient(135deg, var(--accent), var(--accent-3)); padding:24px; display:grid; gap:14px; }\n.mock span { border-radius:18px; background:rgba(255,255,255,.28); backdrop-filter:blur(10px); }\n.f-icons { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }\n.f-icons article { font-size:34px; }\n.f-icons h3 { font-size:22px; margin:18px 0 6px; }\n\n/* New feature variants */\n.f-stats div { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }\n.f-stats article { text-align:center; padding:32px 20px; }\n.f-stats b { font-size:42px; display:block; color:var(--text); }\n.f-stats span { color:var(--muted); }\n\n.f-compare div { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }\n.f-compare article { padding:24px; position:relative; }\n.f-compare h3 { margin:0 0 8px; }\n.f-compare span { position:absolute; top:16px; right:16px; color:var(--accent); font-size:24px; }\n\n.f-timeline div { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }\n.f-timeline article b { color:var(--accent); font-size:24px; }\n.f-timeline article h3 { margin:8px 0 6px; }\n\n.f-benefits ul { list-style:none; padding:0; margin:0; display:grid; gap:16px; }\n.f-benefits li { padding:16px 20px; background:var(--bg); border-radius:16px; border:1px solid var(--line); }\n.f-benefits b { color:var(--text); }\n\n.f-media { display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:center; }\n.media-grid { display:flex; gap:10px; margin-top:16px; }\n.media-visual { min-height:280px; border-radius:28px; background:linear-gradient(135deg, rgba(163,107,255,.15), rgba(78,214,184,.12)); }\n\n/* Even More Features */\n.f-bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 200px); gap: 16px; }\n.f-bento-item { background: var(--bg); border-radius: 24px; border: 1px solid var(--line); padding: 24px; display: flex; flex-direction: column; justify-content: flex-end; }\n.f-bento-item.tall { grid-row: span 2; background: linear-gradient(135deg, var(--accent), var(--accent-3)); color: #fff; }\n.f-bento-item.wide { grid-column: span 2; }\n.f-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 32px; padding: 40px; color: var(--text); }\n.f-dark-mode { background: #000; color: #fff; }\n.f-dark-mode article { background: #111; border-color: #222; }\n.f-hover-reveal article { transition: transform 0.3s, background 0.3s; cursor: pointer; }\n.f-hover-reveal article:hover { transform: translateY(-10px); background: var(--accent); color: #fff; }\n.f-scroll-reveal { opacity: 0; transform: translateY(30px); transition: all 0.6s ease-out; }\n.f-scroll-reveal.visible { opacity: 1; transform: translateY(0); }\n\n@media (max-width:760px){\n  .f-grid div,.f-spot,.f-icons,.f-stats div,.f-compare div,.f-timeline div,.f-media{grid-template-columns:1fr}\n  .features h2{font-size:38px}\n  .f-media{grid-template-columns:1fr}\n}","js":"const themeBtn = document.querySelector('[data-theme-toggle]');\nconst root = document.documentElement;\nconst savedTheme = localStorage.getItem('premium-block-theme');\nif (savedTheme) root.dataset.theme = savedTheme;\n\nthemeBtn?.addEventListener('click', () => {\n  const next = root.dataset.theme === 'dark' ? 'light' : 'dark';\n  root.dataset.theme = next;\n  localStorage.setItem('premium-block-theme', next);\n});\n\nconst revealItems = document.querySelectorAll('.reveal');\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach((entry) => {\n    if (entry.isIntersecting) {\n      entry.target.classList.add('is-visible');\n      io.unobserve(entry.target);\n    }\n  });\n}, { threshold: 0.16 });\nrevealItems.forEach((item) => io.observe(item));\n\ndocument.querySelectorAll('[data-menu]').forEach((btn) => {\n  btn.addEventListener('click', () => {\n    btn.closest('.block')?.classList.toggle('menu-open');\n  });\n});"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
