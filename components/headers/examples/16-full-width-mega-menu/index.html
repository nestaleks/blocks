  <script>
    const FILES = {"html":"<article class=\"block reveal\">\n  <div class=\"block__label\"><span>Example 11</span><span>Full width mega menu</span></div>\n  <div class=\"demo\"><header class=\"header h-mega\"><a class=\"brand\">MAISON</a><nav><a>Collections</a><a>New</a><a>Sale</a><a>Stories</a></nav><a class=\"mini-cta\">Account</a></header></div>\n</article>","css":":root {\n  --bg: #f5f3ee;\n  --bg-2: #ffffff;\n  --text: #151515;\n  --muted: #67645f;\n  --line: rgba(20,20,20,.12);\n  --card: rgba(255,255,255,.72);\n  --card-solid: #ffffff;\n  --accent: #a36bff;\n  --accent-2: #ffb86b;\n  --accent-3: #4ed6b8;\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\n  --radius: 28px;\n}\n\n:root[data-theme=\"dark\"] {\n  --bg: #0a0b10;\n  --bg-2: #11131c;\n  --text: #f7f4ee;\n  --muted: #aaa7b7;\n  --line: rgba(255,255,255,.14);\n  --card: rgba(255,255,255,.08);\n  --card-solid: #151823;\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  margin: 0;\n  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  color: var(--text);\n  background:\n    radial-gradient(circle at top left, rgba(163,107,255,.20), transparent 36rem),\n    radial-gradient(circle at 85% 10%, rgba(78,214,184,.14), transparent 32rem),\n    var(--bg);\n}\na { color: inherit; text-decoration: none; }\nbutton, input { font: inherit; }\nimg { max-width: 100%; display: block; }\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  backdrop-filter: blur(18px);\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\n  border-bottom: 1px solid var(--line);\n}\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:-.04em; }\n.logo span:first-child {\n  width:38px; height:38px; border-radius:14px;\n  display:grid; place-items:center;\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\n  box-shadow: 0 14px 40px rgba(163,107,255,.35);\n}\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\n.theme-btn, .pill-btn {\n  border:1px solid var(--line);\n  color:var(--text);\n  background:var(--card);\n  border-radius:999px;\n  padding:10px 14px;\n  cursor:pointer;\n  box-shadow: 0 10px 28px rgba(0,0,0,.05);\n}\n.intro { padding: 72px 0 42px; }\n.kicker {\n  display:inline-flex; gap:8px; align-items:center;\n  border:1px solid var(--line);\n  background:var(--card);\n  border-radius:999px;\n  padding:8px 12px;\n  color:var(--muted);\n  font-size:13px;\n  font-weight:700;\n}\nh1 {\n  margin:18px 0 14px;\n  font-size: clamp(42px, 8vw, 92px);\n  line-height:.92;\n  letter-spacing:-.075em;\n}\n.intro p { max-width:760px; color:var(--muted); font-size: clamp(17px, 2vw, 21px); line-height:1.7; }\n.grid { display:grid; gap:28px; padding:28px 0 90px; }\n.block {\n  overflow:hidden;\n  border:1px solid var(--line);\n  border-radius: calc(var(--radius) + 8px);\n  background: var(--card);\n  box-shadow: var(--shadow);\n  backdrop-filter: blur(18px);\n}\n.block__label {\n  display:flex; justify-content:space-between; align-items:center; gap:16px;\n  padding:14px 18px; border-bottom:1px solid var(--line);\n  color:var(--muted); font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.12em;\n}\n.demo { padding: clamp(22px, 4vw, 44px); }\n.badge {\n  display:inline-flex; align-items:center; gap:8px;\n  font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;\n  color:var(--muted);\n  border:1px solid var(--line);\n  padding:7px 10px; border-radius:999px;\n  background:rgba(255,255,255,.08);\n}\n.btn-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; }\n.btn {\n  border:1px solid var(--line);\n  border-radius:999px;\n  padding:12px 17px;\n  font-weight:850;\n  background:var(--text);\n  color:var(--bg);\n  display:inline-flex; gap:8px; align-items:center;\n}\n.btn.secondary { background:transparent; color:var(--text); }\n.reveal { opacity:0; transform: translateY(24px); transition: .7s ease; }\n.reveal.is-visible { opacity:1; transform:none; }\n.footer-note { padding: 28px 0 60px; color:var(--muted); text-align:center; }\n@media (max-width: 780px) {\n  .nav { display:none; }\n  .topbar__inner { min-height:64px; }\n  .intro { padding:42px 0 20px; }\n  h1 { font-size: clamp(38px, 15vw, 58px); }\n  .demo { padding:22px; }\n  .block__label { align-items:flex-start; flex-direction:column; gap:6px; }\n}\n\n\n.header { min-height:82px; display:flex; align-items:center; justify-content:space-between; gap:22px; padding:0 24px; border-radius:26px; border:1px solid var(--line); }\n.header nav { display:flex; gap:22px; color:var(--muted); font-size:14px; }\n.brand { font-weight:950; letter-spacing:-.05em; font-size:22px; }\n.mini-cta { background:var(--text); color:var(--bg); padding:11px 15px; border-radius:999px; font-weight:850; }\n.ghost { color:var(--muted); margin-right:12px; }\n.h-luxury { background:#111; color:#fff; border-color:rgba(255,255,255,.16); }\n.h-luxury nav, .h-luxury .mini-cta { color:#d9d3c6; }\n.h-luxury .mini-cta { background:#d8b46a; color:#111; }\n.h-saas { background:linear-gradient(135deg, rgba(163,107,255,.16), rgba(78,214,184,.12)), var(--card-solid); }\n.h-mobile { position:relative; background:var(--card-solid); }\n.menu-btn { display:none; border:1px solid var(--line); background:transparent; border-radius:12px; padding:8px 11px; color:var(--text); }\n.h-editorial { font-family: Georgia, serif; background:#f4eadc; color:#17120c; }\n.h-editorial .brand { font-size:30px; letter-spacing:.12em; }\n.h-shop { background:#fff; color:#121212; }\n.icons { display:flex; gap:13px; color:#555; }\n.h-glass { background:rgba(255,255,255,.18); backdrop-filter: blur(20px); }\n\n/* New header variants */\n.h-minimal { background:var(--card-solid); }\n.h-minimal .brand { font-weight:800; letter-spacing:-.02em; }\n\n.h-centered { background:linear-gradient(135deg, rgba(163,107,255,.08), rgba(78,214,184,.06)), var(--card-solid); }\n.h-centered { justify-content:center; text-align:center; }\n.h-centered .brand { margin-right:40px; }\n\n.h-tech { background:linear-gradient(135deg, #0a0b10, #11131c); color:#fff; border-color:rgba(255,255,255,.12); }\n.h-tech nav, .h-tech .mini-cta { color:#c9d1e8; }\n.h-tech .mini-cta { background:linear-gradient(135deg, var(--accent), var(--accent-3)); }\n\n.search-box { position:relative; }\n.search-box input {\n  padding:10px 36px 10px 14px;\n  border-radius:999px;\n  border:1px solid var(--line);\n  background:var(--card-solid);\n  font-size:14px;\n}\n.search-box span {\n  position:absolute;\n  right:12px;\n  top:50%;\n  transform:translateY(-50%);\n  color:var(--muted);\n}\n\n.h-mega { background:var(--card-solid); border-width:2px; }\n.h-mega nav { gap:32px; font-weight:600; }\n\n/* Even More Headers */\n.h-floating { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: min(1000px, calc(100% - 40px)); background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-radius: 999px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 1000; }\n.h-side { display: flex; flex-direction: column; width: 80px; height: 100vh; position: fixed; left: 0; top: 0; background: #000; color: #fff; padding: 30px 0; align-items: center; justify-content: space-between; transition: width 0.3s; }\n.h-side:hover { width: 240px; }\n.h-side nav { flex-direction: column; align-items: center; width: 100%; opacity: 0; transition: opacity 0.3s; pointer-events: none; }\n.h-side:hover nav { opacity: 1; pointer-events: all; }\n.h-side .brand { transform: rotate(-90deg); margin: 40px 0; }\n.h-side:hover .brand { transform: none; }\n.h-glass-dark { background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 100px; padding: 10px 30px; }\n.h-ecommerce { background: #fff; border-bottom: 2px solid #000; border-radius: 0; }\n.h-ecommerce .icons { font-size: 20px; }\n.h-brutalist { background: #fff; border: 4px solid #000; box-shadow: 8px 8px 0 #000; border-radius: 0; font-family: \"Space Mono\", monospace; font-weight: 800; }\n\n@media (max-width:760px) {\n  .header { min-height:auto; padding:18px; align-items:flex-start; flex-direction:column; }\n  .header nav { flex-wrap:wrap; gap:12px; }\n  .h-saas > div { display:flex; gap:10px; flex-wrap:wrap; }\n  .menu-btn { display:block; margin-left:auto; }\n  .h-mobile { flex-direction:row; align-items:center; }\n  .h-mobile nav { display:none; position:absolute; left:16px; right:16px; top:64px; background:var(--card-solid); border:1px solid var(--line); border-radius:18px; padding:16px; flex-direction:column; }\n  .menu-open .h-mobile nav { display:flex; }\n  .h-centered { flex-direction:column; }\n  .h-centered .brand { margin-right:0; margin-bottom:12px; }\n  .h-tech { flex-direction:column; }\n  .h-tech nav { margin-bottom:12px; }\n  .h-search { flex-direction:column; gap:12px; }\n  .h-mega nav { gap:16px; }\n}","js":"const themeBtn = document.querySelector('[data-theme-toggle]');\nconst root = document.documentElement;\nconst savedTheme = localStorage.getItem('premium-block-theme');\nif (savedTheme) root.dataset.theme = savedTheme;\n\nthemeBtn?.addEventListener('click', () => {\n  const next = root.dataset.theme === 'dark' ? 'light' : 'dark';\n  root.dataset.theme = next;\n  localStorage.setItem('premium-block-theme', next);\n});\n\nconst revealItems = document.querySelectorAll('.reveal');\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach((entry) => {\n    if (entry.isIntersecting) {\n      entry.target.classList.add('is-visible');\n      io.unobserve(entry.target);\n    }\n  });\n}, { threshold: 0.16 });\nrevealItems.forEach((item) => io.observe(item));\n\ndocument.querySelectorAll('[data-menu]').forEach((btn) => {\n  btn.addEventListener('click', () => {\n    btn.closest('.block')?.classList.toggle('menu-open');\n  });\n});"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
