<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Luxury Info - Contacts</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Contacts / Dark Luxury Info</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"c-06\">\r\n        <div class=\"block__label\"><span>Example 06</span><span>Dark Luxury Info</span></div>\r\n        <div class=\"demo\" style=\"background: #000; padding: 60px; border-radius: 20px;\">\r\n          <div class=\"c-dark-lux\">\r\n            <div class=\"col\">\r\n              <h4>Visit Us</h4>\r\n              <p>Rue de la Paix, 75002<br>Paris, France</p>\r\n            </div>\r\n            <div class=\"col\">\r\n              <h4>Call Us</h4>\r\n              <p>+33 1 00 00 00 00</p>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n.btn-sm { padding: 8px 16px; border-radius: 999px; border: none; background: var(--text); color: var(--bg); font-weight: 600; cursor: pointer; }\r\n\r\n/* --- CONTACTS STYLES --- */\r\n\r\n/* 01: Minimalist Grid */\r\n.c-grid-min { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }\r\n.c-card { padding: 30px; border-radius: 20px; background: var(--bg-2); border: 1px solid var(--line); }\r\n.c-tag { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; display: block; }\r\n.c-card h3 { margin: 0; font-size: 22px; }\r\n\r\n/* 02: Bento */\r\n.c-bento { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }\r\n.c-bento-item { background: var(--bg-2); padding: 24px; border-radius: 20px; border: 1px solid var(--line); }\r\n.c-bento-item.main { grid-row: span 2; display: flex; flex-direction: column; justify-content: space-between; }\r\n.badge { display: inline-block; padding: 4px 10px; border-radius: 100px; background: var(--line); font-size: 11px; font-weight: 800; margin-bottom: 15px; }\r\n.link { font-size: 14px; font-weight: 700; color: var(--accent); text-decoration: none; margin-top: 20px; }\r\n\r\n/* 03: Glassmorphic */\r\n.c-glass { text-align: center; color: #fff; }\r\n.c-glass p { opacity: 0.8; margin-bottom: 30px; }\r\n.c-glass-btn { display: inline-block; padding: 12px 30px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); border-radius: 100px; font-weight: 700; cursor: pointer; }\r\n\r\n/* 04: Split */\r\n.c-split { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }\r\n.kicker-sm { font-size: 13px; font-weight: 800; color: var(--accent); text-transform: uppercase; }\r\n.c-details { display: flex; flex-direction: column; gap: 15px; justify-content: center; }\r\n.c-row { padding-bottom: 10px; border-bottom: 1px solid var(--line); font-size: 15px; }\r\n\r\n/* 05: Socials */\r\n.c-socials { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }\r\n.s-link { padding: 15px 30px; border: 1px solid var(--line); border-radius: 100px; font-weight: 800; transition: .3s; }\r\n.s-link:hover { background: var(--text); color: var(--bg); transform: translateY(-3px); }\r\n\r\n/* 06: Dark Lux */\r\n.c-dark-lux { display: grid; grid-template-columns: 1fr 1fr; color: #fff; text-align: center; }\r\n.c-dark-lux h4 { color: var(--muted); text-transform: uppercase; font-size: 12px; margin-bottom: 20px; }\r\n\r\n/* 07: Map UI */\r\n.c-map-ui { position: relative; height: 350px; }\r\n.map-placeholder { position: absolute; inset: 0; background: center/cover; }\r\n.map-card { position: absolute; bottom: 20px; left: 20px; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 250px; }\r\n.map-card h4 { margin: 0 0 5px; }\r\n.map-card p { font-size: 13px; color: var(--muted); margin-bottom: 15px; }\r\n\r\n/* 08: Brutalist */\r\n.c-brutalist { display: flex; flex-direction: column; gap: 15px; }\r\n.b-box { padding: 20px; border: 3px solid #000; box-shadow: 6px 6px 0 #000; display: flex; justify-content: space-between; align-items: center; }\r\n.b-box.yellow { background: #ffde59; }\r\n.b-box.blue { background: #5ce1e6; }\r\n.b-box span { font-weight: 900; font-size: 12px; }\r\n\r\n/* 09: List */\r\n.c-list-item { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--line); font-weight: 600; }\r\n.c-list-item span:first-child { color: var(--muted); }\r\n\r\n/* 10: Dept */\r\n.d-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }\r\n.d-card { padding: 20px; border: 1px solid var(--line); border-radius: 16px; cursor: pointer; transition: .2s; }\r\n.d-card:hover, .d-card.active { border-color: var(--accent); background: rgba(163,107,255,0.05); }\r\n.d-card h5 { margin: 0 0 5px; }\r\n.d-card p { font-size: 12px; color: var(--muted); margin: 0; }\r\n\r\n@media (max-width: 768px) {\r\n  .c-bento, .c-split, .c-dark-lux, .d-grid { grid-template-columns: 1fr; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\r\n  // Theme Toggle\r\n  const themeBtn = document.querySelector('[data-theme-toggle]');\r\n  const html = document.documentElement;\r\n\r\n  if (themeBtn) {\r\n    themeBtn.addEventListener('click', () => {\r\n      const currentTheme = html.getAttribute('data-theme');\r\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\r\n      html.setAttribute('data-theme', newTheme);\r\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\r\n    });\r\n  }\r\n\r\n  // Intersection Observer for Reveal\r\n  const observerOptions = {\r\n    threshold: 0.1\r\n  };\r\n\r\n  const observer = new IntersectionObserver((entries) => {\r\n    entries.forEach(entry => {\r\n      if (entry.isIntersecting) {\r\n        entry.target.classList.add('active');\r\n      }\r\n    });\r\n  }, observerOptions);\r\n\r\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\r\n});\r\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
