  <script>
    const FILES = {"html":"<article class=\"block reveal\">\n  <div class=\"block__label\"><span>Example 09</span><span>Interactive Spotlight Rail</span></div>\n  <div class=\"demo\">\n    <div class=\"cta-bento\">\n      <div class=\"main\">\n        <h2>Grow your business with us.</h2>\n        <p>Premium solutions for modern brands. Build faster with our components.</p>\n        <button class=\"btn\">Get Started</button>\n      </div>\n      <div class=\"side\">\n        <div class=\"icon\">✦</div>\n        <h3>Join 10k+ users</h3>\n        <p>Trusted by world class teams globally.</p>\n      </div>\n    </div>\n  </div>\n</article>","css":"::root {\n  --bg: #f5f3ee;\n  --bg-2: #ffffff;\n  --text: #151515;\n  --muted: #67645f;\n  --line: rgba(20,20,20,.12);\n  --card: rgba(255,255,255,.72);\n  --card-solid: #ffffff;\n  --accent: #a36bff;\n  --accent-2: #ffb86b;\n  --accent-3: #4ed6b8;\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\n  --radius: 28px;\n}\n\n:root[data-theme=\"dark\"] {\n  --bg: #0a0b10;\n  --bg-2: #11131c;\n  --text: #f7f4ee;\n  --muted: #aaa7b7;\n  --line: rgba(255,255,255,.14);\n  --card: rgba(255,255,255,.08);\n  --card-solid: #151823;\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  margin: 0;\n  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  color: var(--text);\n  background:\n    radial-gradient(circle at top left, rgba(163,107,255,.20), transparent 36rem),\n    radial-gradient(circle at 85% 10%, rgba(78,214,184,.14), transparent 32rem),\n    var(--bg);\n}\na { color: inherit; text-decoration: none; }\nbutton, input { font: inherit; }\nimg { max-width: 100%; display: block; }\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  backdrop-filter: blur(18px);\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\n  border-bottom: 1px solid var(--line);\n}\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:-.04em; }\n.logo span:first-child {\n  width:38px; height:38px; border-radius:14px;\n  display:grid; place-items:center;\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\n  box-shadow: 0 14px 40px rgba(163,107,255,.35);\n}\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\n.theme-btn, .pill-btn {\n  border:1px solid var(--line);\n  color:var(--text);\n  background:var(--card);\n  border-radius:999px;\n  padding:10px 14px;\n  cursor:pointer;\n  box-shadow: 0 10px 28px rgba(0,0,0,.05);\n}\n.intro { padding: 72px 0 42px; }\n.kicker {\n  display:inline-flex; gap:8px; align-items:center;\n  border:1px solid var(--line);\n  background:var(--card);\n  border-radius:999px;\n  padding:8px 12px;\n  color:var(--muted);\n  font-size:13px;\n  font-weight:700;\n}\nh1 {\n  margin:18px 0 14px;\n  font-size: clamp(42px, 8vw, 92px);\n  line-height:.92;\n  letter-spacing:-.075em;\n}\n.intro p { max-width:760px; color:var(--muted); font-size: clamp(17px, 2vw, 21px); line-height:1.7; }\n.grid { display:grid; gap:28px; padding:28px 0 90px; }\n.block {\n  overflow:hidden;\n  border:1px solid var(--line);\n  border-radius: calc(var(--radius) + 8px);\n  background: var(--card);\n  box-shadow: var(--shadow);\n  backdrop-filter: blur(18px);\n}\n.block__label {\n  display:flex; justify-content:space-between; align-items:center; gap:16px;\n  padding:14px 18px; border-bottom:1px solid var(--line);\n  color:var(--muted); font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.12em;\n}\n.demo { padding: clamp(22px, 4vw, 44px); }\n.btn-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; }\n.btn {\n  border:1px solid var(--line);\n  border-radius:999px;\n  padding:12px 17px;\n  font-weight:850;\n  background:var(--text);\n  color:var(--bg);\n  display:inline-flex; gap:8px; align-items:center;\n  cursor:pointer;\n}\n.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }\n.btn:active { transform: translateY(0); }\n.btn.secondary { background:transparent; color:var(--text); }\n.reveal { opacity:0; transform: translateY(24px); transition: .7s ease; }\n.reveal.is-visible { opacity:1; transform:none; }\n.footer-note { padding: 28px 0 60px; color:var(--muted); text-align:center; }\n\n.cta { border-radius:30px; padding:clamp(24px,5vw,54px); background:var(--card-solid); border:1px solid var(--line); text-align:center; }\n.cta h2 { margin:0 0 14px; font-size:clamp(34px,5vw,62px); line-height:1.1; letter-spacing:-.06em; }\n.cta p { color:var(--muted); font-size:18px; max-width:600px; margin:0 auto 24px; }\n.cta-grad { background: linear-gradient(135deg, #a36bff, #4ed6b8); color: #fff; border: 0; box-shadow: 0 20px 40px rgba(163,107,255,0.2); }\n.cta-grad h2 { color: #fff; }\n.cta-grad p { color: rgba(255,255,255,0.8); }\n.cta-grad .btn { background: #fff; color: #000; border: 0; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }\n.cta-grad .btn:hover { background: #f0f0f0; transform: translateY(-2px); }\n.cta-split { display:grid; grid-template-columns:1fr 1fr; gap:28px; text-align:left; align-items:center; }\n.cta-split p { margin-left:0; }\n.cta-split form { display:grid; gap:12px; }\n.cta-split input { padding:14px; border-radius:12px; border:1px solid var(--line); background:var(--bg); }\n.cta-split button { background:var(--text); color:var(--bg); padding:14px; border-radius:12px; font-weight:800; border:0; cursor:pointer; }\n.cta-dark { background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }\n.cta-dark h2 { color: #fff; }\n.cta-dark p { color: rgba(255,255,255,0.5); }\n.cta-dark .btn { background: #fff; color: #000; border: 0; }\n.cta-dark .btn.secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.1); }\n.cta-dark .btn.secondary:hover { background: rgba(255,255,255,0.2); }\n.cta-dark span { color:var(--accent); text-transform:uppercase; font-weight:800; font-size:14px; }\n.cta-newsletter form { display:flex; gap:10px; justify-content:center; }\n.cta-newsletter input { padding:14px 20px; border-radius:999px; border:1px solid var(--line); background:var(--bg); width:300px; }\n.cta-newsletter button { background:var(--text); color:var(--bg); padding:14px 24px; border-radius:999px; font-weight:800; border:0; }\n\n/* New CTA variants */\n.cta-bento { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; background: none; padding: 0; border:0; }\n.cta-bento > div { background: var(--card-solid); border: 1px solid var(--line); border-radius: 32px; padding: clamp(24px, 5vw, 48px); text-align: left; display: flex; flex-direction: column; justify-content: center; }\n.cta-bento h2, .cta-bento h3 { margin: 0 0 16px; letter-spacing: -0.05em; }\n.cta-bento h2 { font-size: clamp(32px, 4vw, 52px); }\n.cta-bento .main { background: #000; color: #fff; border: 0; }\n.cta-bento .main p { color: rgba(255,255,255,0.7); margin-left: 0; }\n.cta-bento .btn { width: fit-content; background: #fff; color: #000; border: 0; }\n.cta-bento .side { text-align: center; align-items: center; background: linear-gradient(135deg, var(--bg-2), var(--bg)); }\n.cta-bento .side .icon { font-size: 48px; margin-bottom: 16px; filter: drop-shadow(0 10px 20px rgba(163,107,255,0.3)); }\n\n.cta-brutalist { \n  background: #ffd700; \n  border: 4px solid #000; \n  box-shadow: 12px 12px 0 #000; \n  color: #000; \n  text-align: center; \n  border-radius: 0; \n  transition: transform 0.2s ease, box-shadow 0.2s ease;\n}\n.cta-brutalist:hover { transform: translate(-4px, -4px); box-shadow: 16px 16px 0 #000; }\n.cta-brutalist h2 { font-weight: 900; text-transform: uppercase; font-style: italic; }\n.cta-brutalist .btn { \n  background: #000; \n  color: #fff; \n  border-radius: 0; \n  border: 2px solid #000; \n  font-weight: 900; \n  padding: 16px 32px; \n  text-transform: uppercase;\n  box-shadow: 6px 6px 0 rgba(0,0,0,0.2);\n}\n\n.cta-glass { \n  background: rgba(255, 255, 255, 0.05); \n  backdrop-filter: blur(25px); \n  -webkit-backdrop-filter: blur(25px);\n  border: 1px solid rgba(255,255,255,0.2); \n  border-radius: 40px; \n  color: #fff; \n  text-align: center; \n  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);\n}\n.cta-glass h2 { color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }\n.cta-glass p { color: rgba(255,255,255,0.7); }\n.cta-glass .btn { background: #fff; color: #000; border: 0; }\n\n.cta-inline-form { \n  background: var(--card-solid); \n  display: flex; \n  flex-direction: column; \n  align-items: center; \n  text-align: center; \n  border-radius: 32px; \n  border: 1px solid var(--line);\n}\n.cta-inline-form form { \n  display: flex; \n  gap: 12px; \n  width: 100%; \n  max-width: 540px; \n  margin-top: 24px; \n  background: var(--bg); \n  padding: 8px; \n  border-radius: 999px; \n  border: 1px solid var(--line);\n}\n.cta-inline-form input { \n  flex: 1; \n  background: transparent; \n  border: 0; \n  padding: 12px 24px; \n  outline: none;\n  color: var(--text);\n}\n.cta-inline-form .btn { padding: 12px 28px; }\n\n.cta-app .btn-row, .cta-dark .btn-row { justify-content: center; }\n.cta-offer span, .cta-dark span { \n  display: inline-block;\n  background: rgba(163,107,255,0.1);\n  color: var(--accent);\n  padding: 6px 16px;\n  border-radius: 999px;\n  font-size: 13px;\n  font-weight: 700;\n  margin-bottom: 20px;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n.cta-dark span { background: rgba(255,255,255,0.1); color: #fff; }\n\n.cta-floating { \n  position: fixed; \n  bottom: 32px; \n  left: 50%; \n  transform: translateX(-50%); \n  width: min(900px, calc(100% - 40px)); \n  background: rgba(255,255,255,0.72); \n  backdrop-filter: blur(24px); \n  -webkit-backdrop-filter: blur(24px);\n  border: 1px solid var(--line); \n  border-radius: 100px; \n  padding: 12px 36px; \n  display: flex; \n  align-items: center; \n  justify-content: space-between; \n  z-index: 1000; \n  box-shadow: 0 20px 60px rgba(0,0,0,0.15); \n  animation: float-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);\n}\n@keyframes float-up {\n  from { transform: translate(-50%, 40px); opacity: 0; }\n  to { transform: translate(-50%, 0); opacity: 1; }\n}\n:root[data-theme=\"dark\"] .cta-floating { background: rgba(15,18,35,0.72); }\n\n@media (max-width: 780px) {\n  .nav { display:none; }\n  .cta-split { grid-template-columns: 1fr; }\n  .cta-bento { grid-template-columns: 1fr; }\n  .cta-newsletter form { flex-direction: column; }\n  .cta-newsletter input { width: 100%; }\n  .hide-mobile { display: none; }\n}\n","js":"const themeBtn = document.querySelector('[data-theme-toggle]');\nconst root = document.documentElement;\nconst savedTheme = localStorage.getItem('premium-block-theme');\nif (savedTheme) root.dataset.theme = savedTheme;\n\nthemeBtn?.addEventListener('click', () => {\n  const next = root.dataset.theme === 'dark' ? 'light' : 'dark';\n  root.dataset.theme = next;\n  localStorage.setItem('premium-block-theme', next);\n});\n\nconst revealItems = document.querySelectorAll('.reveal');\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach((entry) => {\n    if (entry.isIntersecting) {\n      entry.target.classList.add('is-visible');\n      io.unobserve(entry.target);\n    }\n  });\n}, { threshold: 0.16 });\nrevealItems.forEach((item) => io.observe(item));\n\ndocument.querySelectorAll('[data-menu]').forEach((btn) => {\n  btn.addEventListener('click', () => {\n    btn.closest('.block')?.classList.toggle('menu-open');\n  });\n});"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
