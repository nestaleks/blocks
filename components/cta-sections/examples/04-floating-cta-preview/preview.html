<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="light">
  <main class="blocks-grid">
<article class="block reveal">
  <div class="block__label"><span>Example 13</span><span>Floating CTA (Preview)</span></div>
  <div class="demo" style="height: 150px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
    <p style="color: var(--muted);">This is a preview. Scroll down to see it in action at the bottom of the page.</p>
    <section class="cta-floating" style="position: absolute; bottom: 20px;">
      <div style="font-weight: 800; display: flex; align-items: center; gap: 10px;">
        <span style="color: var(--accent);">✦</span>
        Ready to start?
      </div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <span style="font-size: 13px; color: var(--muted); display: none; @media (min-width: 600px) { display: block; }">Limited slots available for May</span>
        <button class="btn">Get Started</button>
      </div>
    </section>
  </div>
</article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
