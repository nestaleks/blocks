<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Contrast Deck</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Process / Minimal Contrast Deck</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"process-01\">\r\n        <div class=\"block__label\"><span>Example 01</span><span>Minimal Contrast Deck</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"process-steps\">\r\n            <div class=\"p-step\">\r\n              <span class=\"p-num\">01</span>\r\n              <h4>Discovery</h4>\r\n              <p>We analyze your needs and goals to build a roadmap.</p>\r\n            </div>\r\n            <div class=\"p-step\">\r\n              <span class=\"p-num\">02</span>\r\n              <h4>Strategy</h4>\r\n              <p>Planning the perfect approach for your business growth.</p>\r\n            </div>\r\n            <div class=\"p-step\">\r\n              <span class=\"p-num\">03</span>\r\n              <h4>Execution</h4>\r\n              <p>Our team brings the vision to life with precision.</p>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- PROCESS STYLES --- */\r\n\r\n/* 01: Minimal Contrast Deck */\r\n.process-steps { display: flex; gap: 30px; }\r\n.p-step { flex: 1; }\r\n.p-num { font-size: 32px; font-weight: 900; color: var(--accent); opacity: 0.3; display: block; margin-bottom: 15px; }\r\n.p-step h4 { margin: 0 0 10px; font-size: 20px; }\r\n.p-step p { margin: 0; color: var(--muted); font-size: 14px; }\r\n\r\n/* 02: Bento Process */\r\n.process-bento { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }\r\n.p-b-card { padding: 30px; background: var(--bg-2); border-radius: 24px; border: 1px solid var(--line); }\r\n.p-b-card.accent { background: var(--accent); color: #fff; }\r\n.p-b-card.wide { grid-column: span 2; }\r\n.p-b-card h3 { margin: 10px 0; font-size: 24px; }\r\n.badge { background: rgba(0,0,0,0.1); padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 800; }\r\n\r\n/* 03: Vertical */\r\n.process-vertical { display: flex; flex-direction: column; gap: 30px; padding-left: 20px; border-left: 2px solid var(--line); }\r\n.v-step { position: relative; }\r\n.v-marker { position: absolute; left: -29px; top: 0; width: 16px; height: 16px; background: var(--bg); border: 3px solid var(--accent); border-radius: 50%; }\r\n.v-content h5 { margin: 0 0 5px; font-size: 18px; }\r\n\r\n/* 04: Glass Flow */\r\n.process-glass { display: flex; align-items: center; gap: 20px; justify-content: center; }\r\n.p-g-card { padding: 20px 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; color: #fff; text-align: center; }\r\n.p-g-num { font-weight: 900; opacity: 0.5; margin-bottom: 5px; }\r\n.p-g-arrow { color: rgba(255,255,255,0.3); font-size: 24px; }\r\n\r\n/* 05: Minimal */\r\n.process-minimal { display: flex; flex-direction: column; gap: 40px; }\r\n.m-step { display: flex; gap: 30px; }\r\n.m-num { font-size: 40px; font-weight: 900; color: var(--accent); line-height: 1; }\r\n.m-text h4 { margin: 0 0 10px; }\r\n\r\n/* 06: Brutalist */\r\n.process-brutal { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }\r\n.br-step { padding: 30px; background: #fff; border: 4px solid #fff; box-shadow: 10px 10px 0 var(--accent-2); }\r\n.br-num { font-weight: 900; background: #000; color: #fff; padding: 5px 15px; width: fit-content; margin-bottom: 15px; }\r\n.br-step h3 { color: #000; font-weight: 900; margin: 0 0 10px; }\r\n\r\n/* 07: Horizontal Line */\r\n.process-h-line { display: flex; align-items: center; justify-content: space-between; position: relative; }\r\n.h-step { text-align: center; z-index: 1; position: relative; }\r\n.h-circle { width: 40px; height: 40px; background: var(--bg-2); border: 2px solid var(--line); border-radius: 50%; display: grid; place-items: center; margin: 0 auto 10px; font-weight: 800; }\r\n.h-step.active .h-circle { border-color: var(--accent); background: var(--accent); color: #fff; }\r\n.h-line { flex: 1; height: 2px; background: var(--line); margin-bottom: 30px; }\r\n\r\n/* 08: Floating */\r\n.process-floating { display: flex; justify-content: space-around; }\r\n.f-bubble { width: 120px; height: 120px; background: var(--bg-2); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid var(--line); }\r\n.f-bubble.accent { background: var(--accent); color: #fff; transform: translateY(-20px); }\r\n.f-icon { font-size: 32px; margin-bottom: 5px; }\r\n\r\n/* 09: Zig-Zag */\r\n.process-zigzag { display: flex; flex-direction: column; gap: 60px; }\r\n.z-row { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }\r\n.z-row.reverse { direction: rtl; }\r\n.z-row.reverse .z-info { direction: ltr; }\r\n.z-img img { width: 100%; border-radius: 24px; }\r\n.step-label { font-size: 40px; font-weight: 900; color: var(--accent); opacity: 0.2; }\r\n\r\n/* 10: Hover Cards */\r\n.process-hover { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\r\n.h-card { padding: 40px; background: var(--bg-2); border-radius: 24px; border: 1px solid var(--line); transition: .3s; }\r\n.h-card:hover { border-color: var(--accent); transform: scale(1.02); }\r\n.h-card.accent { background: var(--accent); color: #fff; }\r\n\r\n@media (max-width: 768px) {\r\n  .process-steps, .process-bento, .process-glass, .process-brutal, .process-hover, .z-row { grid-template-columns: 1fr; flex-direction: column; }\r\n  .p-g-arrow { transform: rotate(90deg); }\r\n  .process-h-line { display: none; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n\r\n.gallery-footer { padding: 60px 0; text-align: center; color: var(--muted); border-top: 1px solid var(--line); margin-top: 60px; }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\r\n  // Theme Toggle\r\n  const themeBtn = document.querySelector('[data-theme-toggle]');\r\n  const html = document.documentElement;\r\n\r\n  if (themeBtn) {\r\n    themeBtn.addEventListener('click', () => {\r\n      const currentTheme = html.getAttribute('data-theme');\r\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\r\n      html.setAttribute('data-theme', newTheme);\r\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\r\n    });\r\n  }\r\n\r\n  // Intersection Observer for Reveal\r\n  const observerOptions = {\r\n    threshold: 0.1\r\n  };\r\n\r\n  const observer = new IntersectionObserver((entries) => {\r\n    entries.forEach(entry => {\r\n      if (entry.isIntersecting) {\r\n        entry.target.classList.add('active');\r\n      }\r\n    });\r\n  }, observerOptions);\r\n\r\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\r\n});\r\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
