<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Contrast Deck</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Services / Minimal Contrast Deck</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"service-01\">\r\n        <div class=\"block__label\"><span>Example 01</span><span>Minimal Contrast Deck</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"s-grid-min\">\r\n            <div class=\"s-card\">\r\n              <div class=\"s-icon\">✦</div>\r\n              <h3>Web Design</h3>\r\n              <p>Creating beautiful, functional websites tailored to your brand identity.</p>\r\n            </div>\r\n            <div class=\"s-card\">\r\n              <div class=\"s-icon\">◈</div>\r\n              <h3>Development</h3>\r\n              <p>High-performance web applications built with modern technologies.</p>\r\n            </div>\r\n            <div class=\"s-card\">\r\n              <div class=\"s-icon\">❖</div>\r\n              <h3>Marketing</h3>\r\n              <p>Strategic digital marketing to grow your online presence and sales.</p>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n.btn-sm {\r\n  padding: 8px 16px; border-radius: 999px; border: none;\r\n  background: var(--text); color: var(--bg); font-weight: 600; cursor: pointer;\r\n}\r\n.btn-sm.outline { background: transparent; border: 1px solid var(--line); color: var(--text); }\r\n\r\n/* --- SERVICES STYLES --- */\r\n\r\n/* 01: Minimal Contrast Deck */\r\n.s-grid-min { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }\r\n.s-card { padding: 24px; border-radius: 20px; background: var(--bg-2); border: 1px solid var(--line); transition: .3s; }\r\n.s-card:hover { transform: translateY(-5px); border-color: var(--accent); }\r\n.s-icon { font-size: 32px; margin-bottom: 16px; color: var(--accent); }\r\n.s-card h3 { margin: 0 0 12px; font-size: 20px; }\r\n.s-card p { margin: 0; color: var(--muted); font-size: 15px; }\r\n\r\n/* 02: Glassmorphic */\r\n.s-grid-glass { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }\r\n.s-card-glass {\r\n  background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);\r\n  border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;\r\n  padding: 32px; width: 300px; color: #fff; text-align: center;\r\n}\r\n.s-card-glass .s-icon { font-size: 40px; color: #fff; }\r\n\r\n/* 03: Bento */\r\n.s-bento { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: auto auto; gap: 16px; }\r\n.s-bento-item { background: var(--bg-2); border: 1px solid var(--line); border-radius: 20px; padding: 24px; }\r\n.s-bento-item.main { grid-column: span 2; grid-row: span 2; }\r\n.s-bento-item.accent { background: var(--accent); color: #fff; }\r\n.s-tag { display: inline-block; padding: 4px 10px; border-radius: 999px; background: var(--line); font-size: 12px; font-weight: 700; margin-bottom: 12px; }\r\n\r\n/* 04: Modern List */\r\n.s-list-modern { display: flex; flex-direction: column; }\r\n.s-list-item {\r\n  display: flex; align-items: center; padding: 32px 0; border-bottom: 1px solid var(--line);\r\n  transition: .3s; cursor: pointer;\r\n}\r\n.s-list-item:hover { padding-left: 20px; }\r\n.s-list-item .num { font-size: 14px; font-weight: 800; color: var(--accent); margin-right: 40px; }\r\n.s-list-item .content { flex: 1; }\r\n.s-list-item h3 { margin: 0 0 4px; font-size: 24px; }\r\n.s-list-item .arrow { font-size: 24px; transition: .3s; }\r\n.s-list-item:hover .arrow { transform: translateX(10px); color: var(--accent); }\r\n\r\n/* 05: Neo-Brutalism */\r\n.s-grid-brutalist { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\r\n.s-card-brutalist {\r\n  padding: 30px; border: 4px solid #000; box-shadow: 8px 8px 0 #000;\r\n  transition: .2s;\r\n}\r\n.s-card-brutalist:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0 #000; }\r\n.bg-yellow { background: #ffde59; color: #000; }\r\n.bg-blue { background: #5ce1e6; color: #000; }\r\n.s-icon-box { display: inline-block; padding: 6px 12px; border: 3px solid #000; font-weight: 900; margin-bottom: 15px; background: #fff; }\r\n\r\n/* 06: Image Hover */\r\n.s-grid-image { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\r\n.s-card-image {\r\n  height: 300px; border-radius: 24px; position: relative; overflow: hidden;\r\n  background: var(--bg-img) center/cover;\r\n}\r\n.s-card-image .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); opacity: 0.6; transition: .4s; }\r\n.s-card-image .info { position: absolute; bottom: 30px; left: 30px; color: #fff; transform: translateY(20px); transition: .4s; }\r\n.s-card-image:hover .overlay { opacity: 0.9; }\r\n.s-card-image:hover .info { transform: translateY(0); }\r\n\r\n/* 07: Gradient Border */\r\n.s-grid-grad { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }\r\n.s-card-grad {\r\n  padding: 2px; border-radius: 22px; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.s-card-grad .inner { background: var(--bg-2); border-radius: 20px; padding: 30px; height: 100%; }\r\n.s-icon-circle { width: 50px; height: 50px; border-radius: 50%; background: var(--bg); display: grid; place-items: center; font-weight: 800; margin-bottom: 20px; }\r\n\r\n/* 08: Abstract Floating */\r\n.s-grid-abstract { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }\r\n.s-card-abstract { padding: 40px; background: var(--bg-2); border-radius: 30px; position: relative; overflow: hidden; }\r\n.shape { position: absolute; width: 100px; height: 100px; filter: blur(30px); opacity: 0.4; z-index: 0; }\r\n.s1 { top: -20px; right: -20px; background: var(--accent); }\r\n.s2 { bottom: -20px; left: -20px; background: var(--accent-2); }\r\n.s-card-abstract * { position: relative; z-index: 1; }\r\n\r\n/* 09: Process */\r\n.s-grid-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; position: relative; }\r\n.s-step { text-align: center; }\r\n.step-num { font-size: 60px; font-weight: 900; opacity: 0.1; display: block; line-height: 1; margin-bottom: -20px; }\r\n\r\n/* 10: Packages */\r\n.s-grid-packages { display: flex; gap: 24px; justify-content: center; }\r\n.s-pkg { width: 280px; padding: 32px; border-radius: 24px; background: var(--bg-2); border: 1px solid var(--line); position: relative; }\r\n.s-pkg.featured { border: 2px solid var(--accent); box-shadow: 0 20px 40px rgba(163,107,255,0.15); }\r\n.s-pkg .badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 800; }\r\n.price { font-size: 32px; font-weight: 800; margin: 20px 0; }\r\n.s-pkg ul { list-style: none; padding: 0; margin-bottom: 30px; }\r\n.s-pkg li { margin-bottom: 12px; font-size: 14px; color: var(--muted); }\r\n\r\n@media (max-width: 768px) {\r\n  .s-bento { grid-template-columns: 1fr; }\r\n  .s-bento-item.main { grid-column: span 1; }\r\n  .s-grid-brutalist, .s-grid-image, .s-grid-grad, .s-grid-abstract, .s-grid-steps { grid-template-columns: 1fr; }\r\n  .s-grid-packages { flex-direction: column; align-items: center; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\r\n  // Theme Toggle\r\n  const themeBtn = document.querySelector('[data-theme-toggle]');\r\n  const html = document.documentElement;\r\n\r\n  if (themeBtn) {\r\n    themeBtn.addEventListener('click', () => {\r\n      const currentTheme = html.getAttribute('data-theme');\r\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\r\n      html.setAttribute('data-theme', newTheme);\r\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\r\n    });\r\n  }\r\n\r\n  // Intersection Observer for Reveal\r\n  const observerOptions = {\r\n    threshold: 0.1\r\n  };\r\n\r\n  const observer = new IntersectionObserver((entries) => {\r\n    entries.forEach(entry => {\r\n      if (entry.isIntersecting) {\r\n        entry.target.classList.add('active');\r\n      }\r\n    });\r\n  }, observerOptions);\r\n\r\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\r\n});\r\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
