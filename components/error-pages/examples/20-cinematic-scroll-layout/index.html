<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Scroll Layout</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; background: #0f1115; color: #f3f4f6; }
    .bar { position: sticky; top: 0; z-index: 20; display: flex; gap: 8px; align-items: center; justify-content: space-between; padding: 12px 16px; background: #161a22; border-bottom: 1px solid #2b3240; }
    .meta { font-size: 14px; opacity: 0.92; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid #3b4454; background: #222938; color: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #2a3346; }
    iframe { width: 100%; height: calc(100vh - 62px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">Error Pages / Cinematic Scroll Layout</div>
    <div class="actions">
      <button class="btn" data-copy="html">Copy HTML</button>
      <button class="btn" data-copy="css">Copy CSS</button>
      <button class="btn" data-copy="js">Copy JS</button>
      <a class="btn" href="./preview.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">Open Preview</a>
    </div>
  </div>
  <iframe src="./preview.html" title="preview"></iframe>
  <script>
    const FILES = {"html":"<article class=\"block reveal\" id=\"error-01\">\r\n        <div class=\"block__label\"><span>Example 20</span><span>Cinematic Scroll Layout</span></div>\r\n        <div class=\"demo\">\r\n          <div class=\"error-centered\">\r\n            <span class=\"error-code\">404</span>\r\n            <h2>Page not found</h2>\r\n            <p>Sorry, the page you are looking for doesn't exist or has been moved.</p>\r\n            <a href=\"../index.html\" class=\"btn-primary\">Back to home</a>\r\n          </div>\r\n        </div>\r\n      </article>","css":":root {\r\n  --bg: #f5f3ee;\r\n  --bg-2: #ffffff;\r\n  --text: #151515;\r\n  --muted: #67645f;\r\n  --line: rgba(20,20,20,.12);\r\n  --card: rgba(255,255,255,.72);\r\n  --accent: #a36bff;\r\n  --accent-2: #ffb86b;\r\n  --shadow: 0 24px 80px rgba(15, 15, 20, .12);\r\n  --radius: 28px;\r\n}\r\n\r\n:root[data-theme=\"dark\"] {\r\n  --bg: #0a0b10;\r\n  --bg-2: #11131c;\r\n  --text: #f7f4ee;\r\n  --muted: #aaa7b7;\r\n  --line: rgba(255,255,255,.14);\r\n  --card: rgba(255,255,255,.08);\r\n  --shadow: 0 24px 90px rgba(0,0,0,.45);\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\nbody {\r\n  margin: 0;\r\n  font-family: Inter, sans-serif;\r\n  color: var(--text);\r\n  background: var(--bg);\r\n}\r\n.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }\r\n\r\n/* UI Components */\r\n.topbar {\r\n  position: sticky; top: 0; z-index: 50;\r\n  backdrop-filter: blur(18px);\r\n  background: color-mix(in srgb, var(--bg) 82%, transparent);\r\n  border-bottom: 1px solid var(--line);\r\n}\r\n.topbar__inner { min-height: 74px; display: flex; align-items: center; justify-content: space-between; }\r\n.logo { display:flex; align-items:center; gap:10px; font-weight:900; text-decoration: none; color: inherit; }\r\n.logo span:first-child {\r\n  width:38px; height:38px; border-radius:12px;\r\n  display:grid; place-items:center;\r\n  color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2));\r\n}\r\n.nav { display:flex; gap:18px; color:var(--muted); font-size:14px; }\r\n.nav a { text-decoration: none; color: inherit; font-weight: 500; }\r\n.theme-btn {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:10px 14px; cursor:pointer; color: var(--text);\r\n}\r\n\r\n.intro { padding: 80px 0 40px; }\r\n.kicker {\r\n  border:1px solid var(--line); background:var(--card); border-radius:999px;\r\n  padding:6px 14px; color:var(--muted); font-size:13px; font-weight:700;\r\n}\r\nh1 { font-size: clamp(32px, 6vw, 64px); line-height: 1.1; margin: 20px 0; }\r\n.intro p { color: var(--muted); font-size: 18px; max-width: 600px; }\r\n\r\n.grid { display: grid; gap: 40px; padding-bottom: 100px; }\r\n.block {\r\n  border-radius: var(--radius); border: 1px solid var(--line);\r\n  background: var(--card); overflow: hidden; box-shadow: var(--shadow);\r\n}\r\n.block__label {\r\n  padding: 12px 20px; border-bottom: 1px solid var(--line);\r\n  display: flex; justify-content: space-between; font-size: 12px;\r\n  font-weight: 800; text-transform: uppercase; color: var(--muted);\r\n}\r\n.demo { padding: 40px; }\r\n\r\n/* --- ERROR STYLES --- */\r\n\r\n/* 01: Centered */\r\n.error-centered { text-align: center; max-width: 400px; margin: 0 auto; }\r\n.error-code { font-size: 120px; font-weight: 900; color: var(--accent); line-height: 1; }\r\n.btn-primary { display: inline-block; padding: 14px 30px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 99px; font-weight: 700; margin-top: 20px; }\r\n\r\n/* 02: Bento */\r\n.error-bento { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }\r\n.err-b-card { padding: 30px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 24px; }\r\n.err-b-card.main { grid-row: span 2; display: flex; flex-direction: column; justify-content: center; background: var(--accent); color: #fff; }\r\n.err-b-card.wide { grid-column: span 2; }\r\n.err-links { display: flex; gap: 15px; margin-top: 15px; }\r\n.err-links a { color: var(--accent); font-weight: 700; text-decoration: none; }\r\n\r\n/* 03: Ghost */\r\n.error-ghost { text-align: center; }\r\n.ghost-icon { font-size: 80px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }\r\n@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }\r\n\r\n/* 05: Glitch */\r\n.error-glitch { font-size: 60px; font-weight: 900; text-align: center; position: relative; color: #fff; }\r\n.error-glitch::before, .error-glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; }\r\n.error-glitch::before { left: 2px; text-shadow: -2px 0 #ff00c1; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim 5s infinite linear alternate-reverse; }\r\n.error-glitch::after { left: -2px; text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim2 5s infinite linear alternate-reverse; }\r\n@keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 20px, 0); } 100% { clip: rect(80px, 9999px, 90px, 0); } }\r\n\r\n/* 06: Brutalist */\r\n.error-brutal { display: flex; justify-content: center; }\r\n.br-box { padding: 40px; border: 4px solid #000; background: var(--accent-2); box-shadow: 10px 10px 0 #000; text-align: center; }\r\n.br-box h1 { font-size: 100px; margin: 0; color: #000; }\r\n.br-box a { display: block; margin-top: 20px; padding: 15px; background: #000; color: #fff; text-decoration: none; font-weight: 900; }\r\n\r\n/* 07: Split */\r\n.error-split { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }\r\n.split-visual img { width: 100%; border-radius: 20px; }\r\n.error-split input { width: 100%; padding: 12px 20px; border-radius: 99px; border: 1px solid var(--line); margin-top: 20px; }\r\n\r\n/* 08: Floating */\r\n.error-floating { height: 200px; position: relative; display: flex; align-items: center; justify-content: center; }\r\n.f-item { position: absolute; font-size: 40px; font-weight: 900; color: var(--accent); opacity: 0.2; }\r\n.item-1 { top: 20px; left: 20%; animation: float 4s infinite; }\r\n.item-2 { bottom: 30px; right: 25%; animation: float 3s infinite reverse; }\r\n\r\n/* 09: Console */\r\n.error-console { background: #1a1a1a; border-radius: 10px; overflow: hidden; font-family: monospace; color: #fff; }\r\n.c-header { background: #333; padding: 10px; font-size: 12px; color: #999; display: flex; gap: 8px; }\r\n.c-body { padding: 20px; }\r\n.err { color: #ff5555; }\r\n.cursor { animation: blink 1s infinite; }\r\n@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }\r\n\r\n/* 10: Modal */\r\n.error-modal { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 40px; text-align: center; color: #fff; max-width: 400px; margin: 0 auto; }\r\n.m-icon { font-size: 48px; margin-bottom: 20px; }\r\n.error-modal button { width: 100%; padding: 14px; border-radius: 99px; border: none; background: #fff; color: #000; font-weight: 700; cursor: pointer; margin-top: 20px; }\r\n\r\n@media (max-width: 768px) {\r\n  .error-bento, .error-split { grid-template-columns: 1fr; }\r\n}\r\n\r\n.reveal { opacity: 0; transform: translateY(20px); transition: .6s ease-out; }\r\n.reveal.active { opacity: 1; transform: translateY(0); }\r\n\r\n.gallery-footer { padding: 60px 0; text-align: center; color: var(--muted); border-top: 1px solid var(--line); margin-top: 60px; }\r\n","js":"document.addEventListener('DOMContentLoaded', () => {\r\n  // Theme Toggle\r\n  const themeBtn = document.querySelector('[data-theme-toggle]');\r\n  const html = document.documentElement;\r\n\r\n  if (themeBtn) {\r\n    themeBtn.addEventListener('click', () => {\r\n      const currentTheme = html.getAttribute('data-theme');\r\n      const newTheme = currentTheme === 'light' ? 'dark' : 'light';\r\n      html.setAttribute('data-theme', newTheme);\r\n      themeBtn.textContent = newTheme === 'light' ? '◑' : '☼';\r\n    });\r\n  }\r\n\r\n  // Intersection Observer for Reveal\r\n  const observerOptions = {\r\n    threshold: 0.1\r\n  };\r\n\r\n  const observer = new IntersectionObserver((entries) => {\r\n    entries.forEach(entry => {\r\n      if (entry.isIntersecting) {\r\n        entry.target.classList.add('active');\r\n      }\r\n    });\r\n  }, observerOptions);\r\n\r\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\r\n});\r\n"};
    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        await navigator.clipboard.writeText(FILES[type] || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1000);
      });
    });
  </script>
</body>
</html>
